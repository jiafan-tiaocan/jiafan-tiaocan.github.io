# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: Fan Jia / 调参blog
  pageTitleSuffix: " · AI 与生成模型"
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: zh-CN
  baseUrl: jiafan-tiaocan.github.io
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: local
    cdnCaching: false
    typography:
      title: Noto Sans SC
      header: Noto Sans SC
      body: Noto Serif SC
      code: IBM Plex Mono
    colors:
      lightMode:
        light: "#f7f5ef"
        lightgray: "#e4e0d5"
        gray: "#97978f"
        darkgray: "#474b46"
        dark: "#1f2421"
        secondary: "#2f6657"
        tertiary: "#c3683e"
        highlight: rgba(47, 102, 87, 0.12)
        textHighlight: "#f0cc5b66"
      darkMode:
        light: "#171a18"
        lightgray: "#2d322e"
        gray: "#7b817a"
        darkgray: "#d6d8d1"
        dark: "#f0eee7"
        secondary: "#8dc5b0"
        tertiary: "#e29a73"
        highlight: rgba(141, 197, 176, 0.13)
        textHighlight: "#c9a94d66"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: false
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
      condition: has-toc
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
      katexOptions:
        strict: ignore
        throwOnError: true
    order: 80
  - source: github:quartz-community/citations
    enabled: false
    order: 85
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/ox-hugo
    enabled: false
    order: 91
  - source: github:quartz-community/roam
    enabled: false
    order: 92
  - source: github:quartz-community/fonts
    enabled: true
    options:
      useThemeFonts: false
      fontOrigin: local
      title: '"Noto Sans SC", "PingFang SC", sans-serif'
      header: '"Noto Sans SC", "PingFang SC", sans-serif'
      body: '"Noto Serif SC", "Songti SC", serif'
      interface: '"Noto Sans SC", "PingFang SC", sans-serif'
      code: '"IBM Plex Mono", "SFMono-Regular", monospace'
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: false
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/encrypted-pages
    enabled: false
  - source: github:quartz-community/stacked-pages
    enabled: false
    layout:
      position: afterBody
      priority: 50
      display: all
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: false
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: false
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
      condition: not-index
  - source: ./plugins/content-stats
    enabled: true
    layout:
      position: beforeBody
      priority: 20
      condition: not-index
  - source: ./plugins/new-tab-links
    enabled: true
    layout:
      position: afterBody
      priority: 100
  - source: github:quartz-community/tag-list
    enabled: true
    layout:
      position: beforeBody
      priority: 30
      condition: has-tags
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: ./plugins/author-profile
    enabled: true
    layout:
      position: left
      priority: 15
  - source: ./plugins/darkmode-default
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: false
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: false
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/comments
    enabled: false
    options:
      provider: giscus
      options:
        repo: TODO:username/repo-name
        repoId: TODO:your-repo-id
        category: Announcements
        categoryId: TODO:your-category-id
        mapping: url
        strict: true
        reactionsEnabled: true
        inputPosition: bottom
        lightTheme: light
        darkTheme: dark
        lang: en
    layout:
      position: afterBody
      priority: 10
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        GitHub: https://github.com/jiafan-tiaocan
        RSS: https://jiafan-tiaocan.github.io/index.xml
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: 最近写下的
      limit: 6
      linkToMore: false
      showTags: true
      hideTagPages: true
      hideFolderPages: true
    layout:
      position: afterBody
      priority: 20
      condition: index
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: 文章
      limit: 999
      linkToMore: false
      showTags: false
      hideTagPages: true
      hideFolderPages: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: false
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: true
      delimiters: ---
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
