<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">模型策略与 Harness 的共演化闭环</title>
  <desc id="desc">Harness 在推理时外置计划、状态、工具、权限和验证；环境与验证器产生经验，训练将稳定能力内化进模型；安全不变量始终留在独立外部控制面。</desc>
  <defs>
    <marker id="cyan-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#46D9E8"/></marker>
    <marker id="amber-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#F6C85F"/></marker>
    <marker id="green-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#5DD39E"/></marker>
    <style>
      text{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:32px;font-weight:750;fill:#E6EDF7}.subtitle{font-size:17px;fill:#9FB0C6}.box-title{font-size:23px;font-weight:720;fill:#E6EDF7}.body{font-size:16px;fill:#9FB0C6}.label{font-size:16px;font-weight:700;fill:#E6EDF7}.arrow-label{font-size:15px;font-weight:650}.small{font-size:14px;fill:#9FB0C6}.takeaway{font-size:17px;font-weight:700;fill:#E6EDF7}
    </style>
  </defs>
  <rect width="1200" height="780" rx="28" fill="#0B1220"/>
  <text x="60" y="58" class="title">不是“模型或 Harness”二选一，而是经验在两者之间迁移</text>
  <text x="60" y="91" class="subtitle">推理时外置能力，训练时内化稳定模式；更强的策略又能驱动更复杂的运行时</text>

  <rect x="70" y="145" width="330" height="250" rx="22" fill="#111C2E" stroke="#A78BFA" stroke-width="2.5"/>
  <text x="235" y="190" text-anchor="middle" class="box-title">模型策略 πθ</text>
  <text x="102" y="235" class="body">• 理解目标与当前上下文</text>
  <text x="102" y="270" class="body">• 产生计划、推理和候选动作</text>
  <text x="102" y="305" class="body">• 吸收工具、恢复和验证模式</text>
  <text x="102" y="340" class="body">• 通过 SFT / RL / OPD 更新</text>

  <rect x="800" y="145" width="330" height="250" rx="22" fill="#111C2E" stroke="#46D9E8" stroke-width="2.5"/>
  <text x="965" y="190" text-anchor="middle" class="box-title">运行时 Harness H</text>
  <text x="832" y="235" class="body">• Loop、计划与任务状态</text>
  <text x="832" y="270" class="body">• Context、Memory、Tools、Skills</text>
  <text x="832" y="305" class="body">• Orchestration、Hooks、预算</text>
  <text x="832" y="340" class="body">• Verifier、回滚与人类接管</text>

  <rect x="435" y="210" width="330" height="120" rx="22" fill="#17243A" stroke="#5DD39E" stroke-width="2.5"/>
  <text x="600" y="255" text-anchor="middle" class="box-title">Agent = πθ ⊕ H</text>
  <text x="600" y="292" text-anchor="middle" class="body">共同闭合 action–observation–memory loop</text>

  <line x1="400" y1="270" x2="425" y2="270" stroke="#46D9E8" stroke-width="4" marker-end="url(#cyan-arrow)"/>
  <line x1="765" y1="270" x2="790" y2="270" stroke="#46D9E8" stroke-width="4" marker-end="url(#cyan-arrow)"/>

  <rect x="435" y="415" width="330" height="120" rx="22" fill="#111C2E" stroke="#F6C85F" stroke-width="2.5"/>
  <text x="600" y="458" text-anchor="middle" class="box-title">环境、任务与 Verifier</text>
  <text x="600" y="493" text-anchor="middle" class="body">观察 · 副作用 · 测试 · 奖励 · 人类修正</text>

  <path d="M600 330L600 405" fill="none" stroke="#46D9E8" stroke-width="4" marker-end="url(#cyan-arrow)"/>
  <text x="618" y="373" class="arrow-label" fill="#46D9E8">部署与交互</text>
  <path d="M435 475C335 475 240 435 235 407" fill="none" stroke="#F6C85F" stroke-width="4" marker-end="url(#amber-arrow)"/>
  <text x="250" y="462" class="arrow-label" fill="#F6C85F">经验 → 训练 → 内化</text>
  <path d="M765 475C865 475 960 435 965 407" fill="none" stroke="#5DD39E" stroke-width="4" marker-end="url(#green-arrow)"/>
  <text x="805" y="462" class="arrow-label" fill="#5DD39E">Trace → 改进 Harness</text>

  <rect x="70" y="565" width="1060" height="106" rx="18" fill="#17243A" stroke="#FF6B6B" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="100" y="606" class="label" fill="#FF6B6B">不能被“内化掉”的独立边界</text>
  <text x="100" y="639" class="body">最小权限 · 沙箱 · 凭证隔离 · 审计 · 不可逆动作审批 · 独立完成验收</text>
  <text x="100" y="664" class="small">原因：执行模型不能同时充当自身权限授予者、最终裁判和安全不变量修改者。</text>

  <rect x="70" y="708" width="1060" height="42" rx="12" fill="#111C2E"/>
  <text x="600" y="735" text-anchor="middle" class="takeaway">工程启示：先外置成可观察、可回滚的机制；得到可信轨迹后，再选择性内化为模型能力。</text>
</svg>
