<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">从 Prompt 到 Runtime：长程智能体的控制面外移</title>
  <desc id="desc">控制对象从单次提示词扩展到每次调用的信息，最终扩展到完整执行轨迹；每次扩张都对应上一阶段无法处理的长程失败。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#46D9E8"/></marker>
    <style>
      text{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:32px;font-weight:750;fill:#E6EDF7}.subtitle{font-size:17px;fill:#9FB0C6}.stage{font-size:24px;font-weight:700;fill:#E6EDF7}.era{font-size:15px;font-weight:650;fill:#46D9E8}.label{font-size:17px;font-weight:650;fill:#E6EDF7}.body{font-size:16px;fill:#9FB0C6}.failure{font-size:16px;font-weight:650;fill:#FF6B6B}.takeaway{font-size:18px;font-weight:700;fill:#E6EDF7}
    </style>
  </defs>
  <rect width="1200" height="720" rx="28" fill="#0B1220"/>
  <text x="60" y="58" class="title">长程能力的关键变化：控制面从一次调用扩展到整条轨迹</text>
  <text x="60" y="91" class="subtitle">三个阶段不是互相替代，而是逐层嵌套；新控制面负责上一层无法约束的失败</text>

  <g transform="translate(60 132)">
    <rect width="310" height="430" rx="22" fill="#111C2E" stroke="#A78BFA" stroke-width="2.5"/>
    <text x="28" y="48" class="stage">1. Prompt Engineering</text>
    <text x="28" y="76" class="era">2020–2023 · 控制语言</text>
    <rect x="28" y="108" width="254" height="78" rx="14" fill="#17243A" stroke="#31445F"/>
    <text x="50" y="140" class="label">控制单位：单次 query</text>
    <text x="50" y="166" class="body">CoT · 分解 · 搜索 · 反思</text>
    <text x="28" y="228" class="label">能解决</text>
    <text x="28" y="258" class="body">• 让固定模型显式展开推理</text>
    <text x="28" y="288" class="body">• 在一次调用内形成局部计划</text>
    <line x1="28" y1="320" x2="282" y2="320" stroke="#31445F"/>
    <text x="28" y="356" class="failure">仍会失败：信息与世界状态缺失</text>
    <text x="28" y="386" class="body">措辞无法提供模型从未看到的证据，</text>
    <text x="28" y="412" class="body">也无法治理动作之后发生的事情。</text>
  </g>

  <g transform="translate(445 132)">
    <rect width="310" height="430" rx="22" fill="#111C2E" stroke="#F6C85F" stroke-width="2.5"/>
    <text x="28" y="48" class="stage">2. Context Engineering</text>
    <text x="28" y="76" class="era">2023–2025 · 控制信息</text>
    <rect x="28" y="108" width="254" height="78" rx="14" fill="#17243A" stroke="#31445F"/>
    <text x="50" y="140" class="label">控制单位：conditioned call</text>
    <text x="50" y="166" class="body">RAG · Tools · Memory · 压缩</text>
    <text x="28" y="228" class="label">能解决</text>
    <text x="28" y="258" class="body">• 动态提供证据、工具和历史</text>
    <text x="28" y="288" class="body">• 在预算内选择、压缩与遗忘</text>
    <line x1="28" y1="320" x2="282" y2="320" stroke="#31445F"/>
    <text x="28" y="356" class="failure">仍会失败：轨迹失控</text>
    <text x="28" y="386" class="body">它主要优化“行动前看什么”，却不管</text>
    <text x="28" y="412" class="body">行动后的副作用、恢复与终止。</text>
  </g>

  <g transform="translate(830 132)">
    <rect width="310" height="430" rx="22" fill="#111C2E" stroke="#5DD39E" stroke-width="2.5"/>
    <text x="28" y="48" class="stage">3. Runtime Harness</text>
    <text x="28" y="76" class="era">2025–现在 · 控制轨迹</text>
    <rect x="28" y="108" width="254" height="78" rx="14" fill="#17243A" stroke="#31445F"/>
    <text x="50" y="140" class="label">控制单位：whole trajectory</text>
    <text x="50" y="166" class="body">Loop · State · Hooks · Verifier</text>
    <text x="28" y="228" class="label">新增责任</text>
    <text x="28" y="258" class="body">• 调度、持久状态、权限与预算</text>
    <text x="28" y="288" class="body">• 验证、回滚、重规划与人类接管</text>
    <line x1="28" y1="320" x2="282" y2="320" stroke="#31445F"/>
    <text x="28" y="356" class="label">长程智能体真正出现</text>
    <text x="28" y="386" class="body">执行不再由模型自然停止来定义，</text>
    <text x="28" y="412" class="body">而由外部证据和完成契约来定义。</text>
  </g>

  <line x1="379" y1="346" x2="432" y2="346" stroke="#46D9E8" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="764" y1="346" x2="817" y2="346" stroke="#46D9E8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="60" y="603" width="1080" height="70" rx="16" fill="#17243A" stroke="#31445F"/>
  <text x="600" y="645" text-anchor="middle" class="takeaway">核心迁移：从“让模型给出更好的下一步”，转向“让系统维持整条轨迹的可控、可验证与可恢复”</text>
</svg>
