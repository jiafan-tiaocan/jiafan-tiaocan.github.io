<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Agent OS 的六个平面</title>
  <desc id="desc">业务、信任、控制、运行、状态、观测与进化六个平面通过统一任务标识与事件语义协同。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:25px;font-weight:700}.body{font-size:18px}.small{font-size:16px;fill:#666176}.box{fill:#fff;stroke:#d7d3e7;stroke-width:2}.accent{fill:#f1eeff;stroke:#7568dc;stroke-width:2.5}.trust{fill:#fff2ed;stroke:#d7835f;stroke-width:2.5}.observe{fill:#edf8f2;stroke:#5aa079;stroke-width:2.5}.line{stroke:#827a9a;stroke-width:2.4;fill:none;marker-end:url(#a)}.feedback{stroke:#5a9d78;stroke-width:2.4;stroke-dasharray:8 7;fill:none;marker-end:url(#b)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#827a9a"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#5a9d78"/></marker></defs>
  <rect width="1200" height="820" rx="30" fill="#faf9fd"/>
  <text x="600" y="60" text-anchor="middle" class="h1">Agent OS 不是一条 Loop，而是六个互相约束的平面</text>
  <rect x="75" y="110" width="320" height="190" rx="22" class="accent"/><text x="235" y="155" text-anchor="middle" class="h2">业务平面</text><text x="235" y="195" text-anchor="middle" class="body">目标 · KPI · 产物 · SLA</text><text x="235" y="228" text-anchor="middle" class="body">业务规则 · 人工责任</text><text x="235" y="268" text-anchor="middle" class="small">错了：忙碌但不解决业务问题</text>
  <rect x="440" y="110" width="320" height="190" rx="22" class="trust"/><text x="600" y="155" text-anchor="middle" class="h2">信任平面</text><text x="600" y="195" text-anchor="middle" class="body">身份 · 权限 · 审批 · 审计</text><text x="600" y="228" text-anchor="middle" class="body">隔离 · 幂等 · 补偿</text><text x="600" y="268" text-anchor="middle" class="small">错了：错误半径进入真实世界</text>
  <rect x="805" y="110" width="320" height="190" rx="22" class="box"/><text x="965" y="155" text-anchor="middle" class="h2">控制平面</text><text x="965" y="195" text-anchor="middle" class="body">准入 · 路由 · 规划 · 调度</text><text x="965" y="228" text-anchor="middle" class="body">预算 · 优先级 · 并发策略</text><text x="965" y="268" text-anchor="middle" class="small">错了：任务拥塞、失控或乱序</text>
  <rect x="75" y="405" width="320" height="190" rx="22" class="box"/><text x="235" y="450" text-anchor="middle" class="h2">运行平面</text><text x="235" y="490" text-anchor="middle" class="body">Core Adapter · Worker</text><text x="235" y="523" text-anchor="middle" class="body">进程 · 协程 · Sandbox</text><text x="235" y="563" text-anchor="middle" class="small">错了：不可执行、易崩溃、难扩缩</text>
  <rect x="440" y="405" width="320" height="190" rx="22" class="box"/><text x="600" y="450" text-anchor="middle" class="h2">状态平面</text><text x="600" y="490" text-anchor="middle" class="body">Task · Run · Event · Artifact</text><text x="600" y="523" text-anchor="middle" class="body">Checkpoint · Session · Memory</text><text x="600" y="563" text-anchor="middle" class="small">错了：重启丢现场、重复副作用</text>
  <rect x="805" y="405" width="320" height="190" rx="22" class="observe"/><text x="965" y="450" text-anchor="middle" class="h2">观测与进化平面</text><text x="965" y="490" text-anchor="middle" class="body">Trace · Metric · Log · Eval</text><text x="965" y="523" text-anchor="middle" class="body">Replay · Version · Rollout</text><text x="965" y="563" text-anchor="middle" class="small">错了：永远是不可经营的 Toy</text>
  <path d="M395 205L430 205" class="line"/><path d="M760 205L795 205" class="line"/><path d="M965 300L965 395" class="line"/><path d="M805 500L770 500" class="line"/><path d="M440 500L405 500" class="line"/>
  <path d="M235 405C235 350 235 350 235 310" class="feedback"/><path d="M600 405C600 350 600 350 600 310" class="feedback"/><path d="M965 405C965 340 760 345 720 300" class="feedback"/>
  <rect x="170" y="665" width="860" height="90" rx="18" class="accent"/><text x="600" y="703" text-anchor="middle" class="h2">贯穿六个平面的窄腰</text><text x="600" y="735" text-anchor="middle" class="body">task_id · run_id · step_id · operation_id · agent_version · trace_id</text>
</svg>
