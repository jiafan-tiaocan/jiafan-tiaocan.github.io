<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Tool 调用的信任流水线</title>
  <desc id="desc">模型提出工具请求后，Agent OS 依次进行 schema 校验、策略判定、人工审批、幂等去重、沙箱执行、结果验证和证据写入。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:21px;font-weight:700}.body{font-size:15px}.small{font-size:14px;fill:#666176}.box{fill:#fff;stroke:#d6d2e4;stroke-width:2}.trust{fill:#fff1ea;stroke:#d07c52;stroke-width:2.5}.exec{fill:#eef8ff;stroke:#5e9dcc;stroke-width:2.5}.ok{fill:#edf8f1;stroke:#58a077;stroke-width:2.5}.arrow{stroke:#766e8e;stroke-width:2.5;fill:none;marker-end:url(#a)}.deny{stroke:#c56363;stroke-width:2.2;stroke-dasharray:7 6;fill:none;marker-end:url(#b)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#766e8e"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#c56363"/></marker></defs>
  <rect width="1200" height="760" rx="30" fill="#faf9fd"/><text x="600" y="58" text-anchor="middle" class="h1">Tool 权限不是 Prompt 建议，而是 OS 的强制执行路径</text>
  <rect x="45" y="140" width="130" height="98" rx="17" class="box"/><text x="110" y="178" text-anchor="middle" class="h2">Tool Request</text><text x="110" y="207" text-anchor="middle" class="body">模型只提出意图</text>
  <rect x="205" y="140" width="130" height="98" rx="17" class="trust"/><text x="270" y="178" text-anchor="middle" class="h2">Schema</text><text x="270" y="207" text-anchor="middle" class="body">类型与参数校验</text>
  <rect x="365" y="140" width="140" height="98" rx="17" class="trust"/><text x="435" y="178" text-anchor="middle" class="h2">Policy</text><text x="435" y="207" text-anchor="middle" class="body">身份 · 资源 · 风险</text>
  <rect x="535" y="140" width="140" height="98" rx="17" class="trust"/><text x="605" y="178" text-anchor="middle" class="h2">Approval</text><text x="605" y="207" text-anchor="middle" class="body">按风险决定是否等待</text>
  <rect x="705" y="140" width="140" height="98" rx="17" class="trust"/><text x="775" y="178" text-anchor="middle" class="h2">Dedup</text><text x="775" y="207" text-anchor="middle" class="body">稳定 operation_id</text>
  <rect x="875" y="140" width="140" height="98" rx="17" class="exec"/><text x="945" y="178" text-anchor="middle" class="h2">Execute</text><text x="945" y="207" text-anchor="middle" class="body">Sandbox + Fencing</text>
  <rect x="1045" y="140" width="120" height="98" rx="17" class="ok"/><text x="1105" y="178" text-anchor="middle" class="h2">Evidence</text><text x="1105" y="207" text-anchor="middle" class="body">结果与证据</text>
  <path d="M175 189L195 189" class="arrow"/><path d="M335 189L355 189" class="arrow"/><path d="M505 189L525 189" class="arrow"/><path d="M675 189L695 189" class="arrow"/><path d="M845 189L865 189" class="arrow"/><path d="M1015 189L1035 189" class="arrow"/>
  <rect x="355" y="350" width="330" height="115" rx="20" class="box"/><text x="520" y="391" text-anchor="middle" class="h2">Decision</text><text x="520" y="424" text-anchor="middle" class="body">allow · deny · require_approval · force_sandbox</text><text x="520" y="449" text-anchor="middle" class="small">策略由 AgentSpec、用户、租户、资源和参数共同决定</text>
  <path d="M435 238L475 340" class="arrow"/><path d="M605 238L565 340" class="arrow"/>
  <rect x="85" y="350" width="205" height="115" rx="20" fill="#fff0f0" stroke="#c96f6f" stroke-width="2.4"/><text x="188" y="391" text-anchor="middle" class="h2">Denied</text><text x="188" y="424" text-anchor="middle" class="body">不给模型伪造成功</text><text x="188" y="449" text-anchor="middle" class="small">记录原因并回填结构化错误</text><path d="M355 407L300 407" class="deny"/>
  <rect x="745" y="350" width="370" height="115" rx="20" class="ok"/><text x="930" y="391" text-anchor="middle" class="h2">Operation Record</text><text x="930" y="424" text-anchor="middle" class="body">started / succeeded / failed / uncertain</text><text x="930" y="449" text-anchor="middle" class="small">重试先查记录；不确定副作用进入补偿或人工核验</text><path d="M945 238L935 340" class="arrow"/><path d="M1105 238L1010 340" class="arrow"/>
  <rect x="175" y="580" width="850" height="100" rx="21" class="trust"/><text x="600" y="619" text-anchor="middle" class="h2">凭证永远不进入不可信执行环境</text><text x="600" y="652" text-anchor="middle" class="body">Tool Proxy 在沙箱之外持有凭证；沙箱只拿短期、窄作用域的能力句柄和结果</text>
</svg>
