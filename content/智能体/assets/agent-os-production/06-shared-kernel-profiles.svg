<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">共享可靠性内核与业务 Profile</title>
  <desc id="desc">业务 Profile 拥有目标、路由、完成契约和资源键；共享内核拥有任务、状态、租约、幂等、运行时适配、观测和人工网关；Agent Core 位于最下方并可替换。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:25px;font-weight:700}.body{font-size:18px}.small{font-size:15px;fill:#666176}.profile1{fill:#eef8ff;stroke:#5f9dcc;stroke-width:2.5}.profile2{fill:#fff3eb;stroke:#d58b57;stroke-width:2.5}.kernel{fill:#f1eeff;stroke:#7568dc;stroke-width:2.7}.core{fill:#fff;stroke:#d5d1e4;stroke-width:2.3}.arrow{stroke:#766e8e;stroke-width:2.8;fill:none;marker-end:url(#a)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#766e8e"/></marker></defs>
  <rect width="1200" height="860" rx="30" fill="#faf9fd"/><text x="600" y="58" text-anchor="middle" class="h1">应该统一可靠性，不应该统一业务智能</text>
  <rect x="75" y="105" width="490" height="210" rx="23" class="profile1"/><text x="320" y="150" text-anchor="middle" class="h2">持续运营 Profile</text><text x="320" y="190" text-anchor="middle" class="body">强意图主控 · 读写隔离 · 定时 Reconcile</text><text x="320" y="225" text-anchor="middle" class="body">账户/计划资源键 · 效果回读 · 风险审批</text><text x="320" y="270" text-anchor="middle" class="small">拥有：业务状态机、路由、并发与完成定义</text>
  <rect x="635" y="105" width="490" height="210" rx="23" class="profile2"/><text x="880" y="150" text-anchor="middle" class="h2">素材生产 Profile</text><text x="880" y="190" text-anchor="middle" class="body">项目 Loop · 专业角色 · AIGC Tool Pool</text><text x="880" y="225" text-anchor="middle" class="body">项目/资产资源键 · 人工审核 · 产物血缘</text><text x="880" y="270" text-anchor="middle" class="small">拥有：角色图、资产规则、返工与验收定义</text>
  <rect x="130" y="390" width="940" height="245" rx="26" class="kernel"/><text x="600" y="438" text-anchor="middle" class="h2">共享 Agent OS 可靠性内核</text><text x="600" y="482" text-anchor="middle" class="body">AgentSpec · Task · Run · Step · Event · Artifact · Checkpoint</text><text x="600" y="520" text-anchor="middle" class="body">Scheduler · Queue · Lease/Fencing · Idempotency · Human Gateway</text><text x="600" y="558" text-anchor="middle" class="body">Runtime Adapter · Supervisor · Policy Engine · Completion Service</text><text x="600" y="596" text-anchor="middle" class="body">Trace · Metric · Log · Eval · Replay · Version · Rollout</text>
  <rect x="260" y="710" width="680" height="95" rx="20" class="core"/><text x="600" y="750" text-anchor="middle" class="h2">可替换的 Agent Core</text><text x="600" y="780" text-anchor="middle" class="body">Model Stream · Agent Loop · Tool Contract · Session / Harness</text>
  <path d="M320 315C350 350 420 365 475 382" class="arrow"/><path d="M880 315C850 350 780 365 725 382" class="arrow"/><path d="M600 635L600 700" class="arrow"/>
</svg>
