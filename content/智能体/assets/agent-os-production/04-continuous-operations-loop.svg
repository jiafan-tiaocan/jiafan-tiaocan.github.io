<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc">
  <title id="title">持续运营型 Agent OS 控制环</title>
  <desc id="desc">定时、事件和用户意图进入主 Agent，经过事实读取、诊断、策略门禁、受控写入、回读验证与持续观察形成闭环。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:23px;font-weight:700}.body{font-size:17px}.small{font-size:15px;fill:#666176}.card{fill:#fff;stroke:#d4d0e4;stroke-width:2}.read{fill:#eef8ff;stroke:#5e9dcc;stroke-width:2.5}.write{fill:#fff1ea;stroke:#d27d52;stroke-width:2.5}.main{fill:#f1eeff;stroke:#7568dc;stroke-width:2.8}.ok{fill:#edf8f1;stroke:#58a077;stroke-width:2.5}.arrow{stroke:#756d8e;stroke-width:2.8;fill:none;marker-end:url(#a)}.loop{stroke:#5b9d76;stroke-width:3;fill:none;stroke-dasharray:9 7;marker-end:url(#b)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#756d8e"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#5b9d76"/></marker></defs>
  <rect width="1200" height="780" rx="30" fill="#faf9fd"/><text x="600" y="58" text-anchor="middle" class="h1">持续运营不是“定时聊天”，而是带证据的 Reconcile Loop</text>
  <rect x="50" y="118" width="210" height="100" rx="18" class="card"/><text x="155" y="155" text-anchor="middle" class="h2">触发</text><text x="155" y="186" text-anchor="middle" class="body">定时 · 事件 · 用户意图</text>
  <rect x="340" y="105" width="260" height="125" rx="20" class="main"/><text x="470" y="150" text-anchor="middle" class="h2">主 Agent</text><text x="470" y="181" text-anchor="middle" class="body">强意图识别 · 任务管理</text><text x="470" y="207" text-anchor="middle" class="small">路由清晰，但不垄断专业上下文</text>
  <rect x="690" y="118" width="220" height="100" rx="18" class="read"/><text x="800" y="155" text-anchor="middle" class="h2">获取事实</text><text x="800" y="186" text-anchor="middle" class="body">只读查询 · 数据快照</text>
  <rect x="955" y="118" width="200" height="100" rx="18" class="read"/><text x="1055" y="155" text-anchor="middle" class="h2">诊断偏差</text><text x="1055" y="186" text-anchor="middle" class="body">当前态 vs 期望态</text>
  <rect x="955" y="355" width="200" height="110" rx="18" class="main"/><text x="1055" y="394" text-anchor="middle" class="h2">形成策略</text><text x="1055" y="425" text-anchor="middle" class="body">目标 · 约束 · 预算</text><text x="1055" y="449" text-anchor="middle" class="small">高风险动作先审批</text>
  <rect x="690" y="355" width="220" height="110" rx="18" class="write"/><text x="800" y="394" text-anchor="middle" class="h2">受控执行</text><text x="800" y="425" text-anchor="middle" class="body">幂等键 · 租约 · 审计</text><text x="800" y="449" text-anchor="middle" class="small">写入能力与只读能力隔离</text>
  <rect x="400" y="355" width="220" height="110" rx="18" class="ok"/><text x="510" y="394" text-anchor="middle" class="h2">外部回读</text><text x="510" y="425" text-anchor="middle" class="body">状态匹配 · 产物存在</text><text x="510" y="449" text-anchor="middle" class="small">Agent 自述不能作为唯一证据</text>
  <rect x="105" y="355" width="220" height="110" rx="18" class="ok"/><text x="215" y="394" text-anchor="middle" class="h2">继续观察</text><text x="215" y="425" text-anchor="middle" class="body">效果窗口 · 异常趋势</text><text x="215" y="449" text-anchor="middle" class="small">完成一次动作 ≠ 业务闭环结束</text>
  <path d="M260 168L330 168" class="arrow"/><path d="M600 168L680 168" class="arrow"/><path d="M910 168L945 168" class="arrow"/><path d="M1055 218L1055 345" class="arrow"/><path d="M955 410L920 410" class="arrow"/><path d="M690 410L630 410" class="arrow"/><path d="M400 410L335 410" class="arrow"/>
  <path d="M215 355C215 290 240 270 330 210" class="loop"/><text x="223" y="297" class="small">下一轮触发</text>
  <rect x="190" y="590" width="820" height="115" rx="22" class="card"/><text x="600" y="632" text-anchor="middle" class="h2">托管模式的底线</text><text x="600" y="665" text-anchor="middle" class="body">无人在线时可以工作，但必须可见、可停、可接管、可回滚，并受预算和风险等级约束</text>
</svg>
