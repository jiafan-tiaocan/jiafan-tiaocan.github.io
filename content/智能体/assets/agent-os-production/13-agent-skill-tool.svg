<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Tool、Skill 与 Subagent 的选择树</title>
  <desc id="desc">确定性 API 优先 Tool，可复用 SOP 且共享上下文优先 Skill；只有存在权限、上下文、生命周期、责任或并行等硬边界时才新建 Agent。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:21px;font-weight:700}.body{font-size:16px}.small{font-size:14px;fill:#666176}.q{fill:#f1eeff;stroke:#7568dc;stroke-width:2.5}.tool{fill:#eef8ff;stroke:#5e9dcc;stroke-width:2.4}.skill{fill:#edf8f1;stroke:#58a077;stroke-width:2.4}.agent{fill:#fff1ea;stroke:#d17f56;stroke-width:2.4}.inline{fill:#fff;stroke:#d3cfe2;stroke-width:2.3}.arrow{stroke:#766e8e;stroke-width:2.5;fill:none;marker-end:url(#a)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#766e8e"/></marker></defs>
  <rect width="1200" height="860" rx="30" fill="#faf9fd"/><text x="600" y="58" text-anchor="middle" class="h1">多 Agent 是昂贵的隔离机制，不是默认编排单位</text>
  <rect x="420" y="105" width="360" height="92" rx="19" class="q"/><text x="600" y="142" text-anchor="middle" class="h2">子问题是否是确定性 API / 算法？</text><text x="600" y="173" text-anchor="middle" class="small">输入输出可定义，模型不需要独立探索</text>
  <rect x="845" y="105" width="250" height="92" rx="19" class="tool"/><text x="970" y="143" text-anchor="middle" class="h2">Tool</text><text x="970" y="174" text-anchor="middle" class="body">类型化调用 + 副作用边界</text><path d="M780 151L835 151" class="arrow"/><text x="810" y="137" class="small">是</text>
  <rect x="420" y="255" width="360" height="100" rx="19" class="q"/><text x="600" y="294" text-anchor="middle" class="h2">是否只是可复用 SOP / 专业知识？</text><text x="600" y="326" text-anchor="middle" class="small">仍共享父 Agent 的权限、上下文和生命周期</text><path d="M600 197L600 245" class="arrow"/><text x="615" y="228" class="small">否</text>
  <rect x="845" y="259" width="250" height="92" rx="19" class="skill"/><text x="970" y="297" text-anchor="middle" class="h2">Skill</text><text x="970" y="328" text-anchor="middle" class="body">渐进披露 + 复用同一 Core</text><path d="M780 305L835 305" class="arrow"/><text x="810" y="291" class="small">是</text>
  <rect x="360" y="420" width="480" height="160" rx="21" class="q"/><text x="600" y="458" text-anchor="middle" class="h2">是否存在至少一个硬边界？</text><text x="600" y="493" text-anchor="middle" class="body">不同 Tool/权限/Side-effect · 独立大上下文 · 独立生命周期</text><text x="600" y="524" text-anchor="middle" class="body">独立审计责任 · 明显可并行且汇总成本低</text><text x="600" y="554" text-anchor="middle" class="small">还要扣除协调、Token、状态同步和恢复成本</text><path d="M600 355L600 410" class="arrow"/><text x="615" y="393" class="small">否</text>
  <rect x="100" y="670" width="350" height="105" rx="20" class="inline"/><text x="275" y="710" text-anchor="middle" class="h2">Inline Step / Function</text><text x="275" y="742" text-anchor="middle" class="body">不用新身份，不制造额外状态</text>
  <rect x="750" y="650" width="350" height="145" rx="20" class="agent"/><text x="925" y="691" text-anchor="middle" class="h2">Subagent / Independent Task</text><text x="925" y="725" text-anchor="middle" class="body">独立 AgentSpec、Budget、Task、Trace</text><text x="925" y="755" text-anchor="middle" class="small">委派必须可取消、可审计、可恢复、可归并</text>
  <path d="M480 580C430 620 360 635 300 660" class="arrow"/><text x="420" y="627" class="small">否</text><path d="M720 580C770 620 840 625 900 640" class="arrow"/><text x="780" y="620" class="small">是</text>
</svg>
