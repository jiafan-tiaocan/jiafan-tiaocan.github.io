<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">Agent Runtime 的彻底可观测性</title>
  <desc id="desc">从任务、运行、步骤到模型、工具、沙箱和外部系统形成关联链路，并区分传输、运行时、Worker 和业务进展四类心跳。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:22px;font-weight:700}.body{font-size:16px}.small{font-size:14px;fill:#666176}.span{fill:#f1eeff;stroke:#7568dc;stroke-width:2.4}.child{fill:#fff;stroke:#d3cfe2;stroke-width:2}.tool{fill:#eef8ff;stroke:#5e9dcc;stroke-width:2.3}.risk{fill:#fff1ea;stroke:#d17f56;stroke-width:2.3}.metric{fill:#edf8f1;stroke:#58a077;stroke-width:2.3}.arrow{stroke:#766e8e;stroke-width:2.4;fill:none;marker-end:url(#a)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#766e8e"/></marker></defs>
  <rect width="1200" height="860" rx="30" fill="#faf9fd"/><text x="600" y="58" text-anchor="middle" class="h1">可观测性必须覆盖“模型之外”的整个 Runtime</text>
  <rect x="95" y="105" width="1010" height="88" rx="19" class="span"/><text x="125" y="140" class="small">TASK SPAN</text><text x="600" y="158" text-anchor="middle" class="h2">task_id · owner · profile · objective_hash · final_status</text>
  <rect x="145" y="230" width="910" height="85" rx="18" class="child"/><text x="175" y="263" class="small">RUN SPAN</text><text x="600" y="281" text-anchor="middle" class="h2">run_id · attempt · agent_version · runtime · worker · lease_epoch</text>
  <rect x="70" y="360" width="210" height="95" rx="17" class="child"/><text x="175" y="396" text-anchor="middle" class="h2">Model Step</text><text x="175" y="427" text-anchor="middle" class="body">model · tokens · latency</text>
  <rect x="310" y="360" width="210" height="95" rx="17" class="tool"/><text x="415" y="396" text-anchor="middle" class="h2">Tool Step</text><text x="415" y="427" text-anchor="middle" class="body">operation_id · result</text>
  <rect x="550" y="360" width="210" height="95" rx="17" class="risk"/><text x="655" y="396" text-anchor="middle" class="h2">Policy Step</text><text x="655" y="427" text-anchor="middle" class="body">decision · reason · actor</text>
  <rect x="790" y="360" width="210" height="95" rx="17" class="tool"/><text x="895" y="396" text-anchor="middle" class="h2">Sandbox Step</text><text x="895" y="427" text-anchor="middle" class="body">profile · cpu · memory</text>
  <path d="M600 193L600 220" class="arrow"/><path d="M600 315C500 340 250 330 175 350" class="arrow"/><path d="M600 315C540 340 465 330 415 350" class="arrow"/><path d="M600 315C620 335 640 338 655 350" class="arrow"/><path d="M600 315C730 338 820 330 895 350" class="arrow"/>
  <rect x="70" y="540" width="240" height="120" rx="19" class="metric"/><text x="190" y="581" text-anchor="middle" class="h2">传输心跳</text><text x="190" y="612" text-anchor="middle" class="body">连接/事件流仍活跃</text><text x="190" y="638" text-anchor="middle" class="small">不能证明任务前进</text>
  <rect x="340" y="540" width="240" height="120" rx="19" class="metric"/><text x="460" y="581" text-anchor="middle" class="h2">Runtime 心跳</text><text x="460" y="612" text-anchor="middle" class="body">模型/子进程仍响应</text><text x="460" y="638" text-anchor="middle" class="small">不能证明 Tool 未死锁</text>
  <rect x="610" y="540" width="240" height="120" rx="19" class="metric"/><text x="730" y="581" text-anchor="middle" class="h2">Worker 心跳</text><text x="730" y="612" text-anchor="middle" class="body">执行容器最近上报</text><text x="730" y="638" text-anchor="middle" class="small">不能证明结果正确</text>
  <rect x="880" y="540" width="240" height="120" rx="19" class="metric"/><text x="1000" y="581" text-anchor="middle" class="h2">业务进展心跳</text><text x="1000" y="612" text-anchor="middle" class="body">Step/Artifact/Checkpoint 推进</text><text x="1000" y="638" text-anchor="middle" class="small">决定诊断或升级</text>
  <rect x="150" y="730" width="900" height="80" rx="18" class="risk"/><text x="600" y="762" text-anchor="middle" class="h2">观测也受信任平面约束</text><text x="600" y="790" text-anchor="middle" class="body">Tool 参数、结果、Prompt 和用户内容默认脱敏；高基数字段不直接进入 Metric</text>
</svg>
