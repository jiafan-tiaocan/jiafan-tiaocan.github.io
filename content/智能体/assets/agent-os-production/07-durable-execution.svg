<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent OS 的耐久执行链</title>
  <desc id="desc">请求经准入、任务提交、队列、租约、运行时、工具和完成证明执行，所有状态与事件进入耐久存储；崩溃后从 checkpoint 重新排队。</desc>
  <defs><style>
    text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252333}.h1{font-size:34px;font-weight:750}.h2{font-size:22px;font-weight:700}.body{font-size:16px}.small{font-size:14px;fill:#666176}.box{fill:#fff;stroke:#d7d3e6;stroke-width:2}.accent{fill:#f1eeff;stroke:#7568dc;stroke-width:2.5}.state{fill:#eef8ff;stroke:#5f9dcc;stroke-width:2.4}.trust{fill:#fff3eb;stroke:#d58b57;stroke-width:2.4}.ok{fill:#edf8f1;stroke:#58a077;stroke-width:2.4}.arrow{stroke:#756d8e;stroke-width:2.6;fill:none;marker-end:url(#a)}.recover{stroke:#c47b54;stroke-width:2.6;stroke-dasharray:9 7;fill:none;marker-end:url(#b)}
  </style><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#756d8e"/></marker><marker id="b" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#c47b54"/></marker></defs>
  <rect width="1200" height="900" rx="30" fill="#faf9fd"/><text x="600" y="58" text-anchor="middle" class="h1">把不确定的 Agent Loop 包进确定性的耐久执行链</text>
  <rect x="45" y="110" width="160" height="92" rx="17" class="box"/><text x="125" y="146" text-anchor="middle" class="h2">触发</text><text x="125" y="176" text-anchor="middle" class="body">API / 定时 / 事件</text>
  <rect x="245" y="110" width="160" height="92" rx="17" class="accent"/><text x="325" y="146" text-anchor="middle" class="h2">准入</text><text x="325" y="176" text-anchor="middle" class="body">身份 / 风险 / 预算</text>
  <rect x="445" y="110" width="160" height="92" rx="17" class="state"/><text x="525" y="146" text-anchor="middle" class="h2">Task</text><text x="525" y="176" text-anchor="middle" class="body">目标与业务状态</text>
  <rect x="645" y="110" width="160" height="92" rx="17" class="box"/><text x="725" y="146" text-anchor="middle" class="h2">Queue</text><text x="725" y="176" text-anchor="middle" class="body">至少一次投递</text>
  <rect x="845" y="110" width="160" height="92" rx="17" class="trust"/><text x="925" y="146" text-anchor="middle" class="h2">Lease</text><text x="925" y="176" text-anchor="middle" class="body">Owner + Epoch</text>
  <rect x="995" y="295" width="160" height="108" rx="17" class="accent"/><text x="1075" y="334" text-anchor="middle" class="h2">Run</text><text x="1075" y="365" text-anchor="middle" class="body">一次执行尝试</text><text x="1075" y="390" text-anchor="middle" class="small">绑定版本与 Worker</text>
  <rect x="745" y="295" width="180" height="108" rx="17" class="accent"/><text x="835" y="334" text-anchor="middle" class="h2">Runtime Adapter</text><text x="835" y="365" text-anchor="middle" class="body">Core 可替换</text><text x="835" y="390" text-anchor="middle" class="small">统一事件 · 取消 · 恢复</text>
  <rect x="485" y="295" width="190" height="108" rx="17" class="trust"/><text x="580" y="334" text-anchor="middle" class="h2">Tool Executor</text><text x="580" y="365" text-anchor="middle" class="body">Policy + Idempotency</text><text x="580" y="390" text-anchor="middle" class="small">Sandbox + Evidence</text>
  <rect x="225" y="295" width="190" height="108" rx="17" class="ok"/><text x="320" y="334" text-anchor="middle" class="h2">Completion</text><text x="320" y="365" text-anchor="middle" class="body">外部完成证明</text><text x="320" y="390" text-anchor="middle" class="small">缺证据则续跑/等待/失败</text>
  <rect x="45" y="295" width="120" height="108" rx="17" class="state"/><text x="105" y="334" text-anchor="middle" class="h2">终态</text><text x="105" y="365" text-anchor="middle" class="body">完成</text><text x="105" y="390" text-anchor="middle" class="body">失败 / 取消</text>
  <path d="M205 156L235 156" class="arrow"/><path d="M405 156L435 156" class="arrow"/><path d="M605 156L635 156" class="arrow"/><path d="M805 156L835 156" class="arrow"/><path d="M925 202C950 240 1010 250 1060 285" class="arrow"/><path d="M995 349L935 349" class="arrow"/><path d="M745 349L685 349" class="arrow"/><path d="M485 349L425 349" class="arrow"/><path d="M225 349L175 349" class="arrow"/>
  <rect x="170" y="520" width="860" height="165" rx="24" class="state"/><text x="600" y="565" text-anchor="middle" class="h2">Durable State Plane</text><text x="600" y="605" text-anchor="middle" class="body">Task DB · Append-only Event · Outbox · Operation Dedup · Artifact · Checkpoint · Human Request</text><text x="600" y="642" text-anchor="middle" class="small">每次状态迁移与事件同事务提交；进程和上下文窗口都不是事实源</text>
  <path d="M525 202L525 510" class="arrow"/><path d="M580 403L580 510" class="arrow"/><path d="M835 403L835 510" class="arrow"/>
  <path d="M840 685C915 735 1000 695 1075 413" class="recover"/><text x="990" y="700" text-anchor="middle" class="small">Worker/Runtime 崩溃：撤销租约，从 Checkpoint 新建 Run</text>
  <rect x="250" y="760" width="700" height="88" rx="18" class="box"/><text x="600" y="797" text-anchor="middle" class="h2">正确性不依赖“永不失败”</text><text x="600" y="826" text-anchor="middle" class="body">依赖可重放状态、稳定 operation_id、fencing token 和独立完成证据</text>
</svg>
