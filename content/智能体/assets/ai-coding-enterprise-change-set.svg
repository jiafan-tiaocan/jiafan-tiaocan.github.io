<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">企业多系统研发中的 Change Set 交付</title>
  <desc id="desc">业务变更先形成契约与依赖图，多个仓库在隔离工作区中并行生成不可变制品，由 release manifest 绑定版本、迁移和特性开关，再沿环境漏斗验证与发布。</desc>
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#15324a"/><stop offset="1" stop-color="#245d72"/></linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#456476"/></marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#b66a2c"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#19384d" flood-opacity="0.12"/></filter>
    <style>
      .title { font: 700 33px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #fff; }
      .subtitle { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #dceaf0; }
      .zone { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #173042; }
      .box-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #173042; }
      .box-body { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #536979; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #405a6b; }
      .label { font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #526b7a; }
      .note { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; fill: #435b6d; }
    </style>
  </defs>

  <rect width="1600" height="980" rx="18" fill="#f8fafc"/>
  <rect width="1600" height="108" rx="18" fill="url(#header)"/><rect y="90" width="1600" height="18" fill="url(#header)"/>
  <text class="title" x="54" y="49">企业多系统研发：管理 Change Set，而不是只管理仓库</text>
  <text class="subtitle" x="56" y="80">契约先行、各仓隔离、制品不可变、组合可追溯；环境和测试始终引用同一个 manifest revision</text>

  <g filter="url(#shadow)">
    <rect x="45" y="145" width="250" height="180" rx="16" fill="#fff5e8" stroke="#c98a48" stroke-width="2.5"/>
    <text class="zone" x="76" y="184">业务变更</text>
    <text class="box-body" x="76" y="220">用户需求 / Incident</text>
    <text class="box-body" x="76" y="247">范围 · 风险 · rollout</text>
    <text class="box-body" x="76" y="274">iteration id</text>
    <text class="mono" x="76" y="301">ITER-2026-0717-03</text>
  </g>
  <line x1="295" y1="235" x2="348" y2="235" stroke="#b66a2c" stroke-width="3" marker-end="url(#arrow-gold)"/>

  <rect x="350" y="132" width="410" height="206" rx="18" fill="#edf3f8" stroke="#7ea5bb" stroke-width="2.5"/>
  <text class="zone" x="380" y="171">契约与依赖图</text>
  <g transform="translate(380 195)"><rect width="155" height="54" rx="9" fill="#fff" stroke="#9bb8c8"/><text class="box-title" x="16" y="33">API / Event</text></g>
  <g transform="translate(560 195)"><rect width="165" height="54" rx="9" fill="#fff" stroke="#9bb8c8"/><text class="box-title" x="16" y="33">Schema / Migration</text></g>
  <g transform="translate(380 268)"><rect width="155" height="44" rx="9" fill="#fff" stroke="#9bb8c8"/><text class="box-body" x="16" y="28">兼容窗口</text></g>
  <g transform="translate(560 268)"><rect width="165" height="44" rx="9" fill="#fff" stroke="#9bb8c8"/><text class="box-body" x="16" y="28">Flag / Rollout 顺序</text></g>
  <line x1="760" y1="235" x2="813" y2="235" stroke="#456476" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="815" y="132" width="740" height="206" rx="18" fill="#edf5f2" stroke="#79a995" stroke-width="2.5"/>
  <text class="zone" x="845" y="171">Change-set Controller</text>
  <text class="box-body" x="845" y="199">拆分 repo task，分配 worktree / namespace / identity，并维护唯一 release manifest</text>
  <g transform="translate(845 226)"><rect width="205" height="74" rx="10" fill="#fff" stroke="#8cb5a5"/><text class="box-title" x="16" y="29">Dependency DAG</text><text class="box-body" x="16" y="53">ready / blocked / owner</text></g>
  <g transform="translate(1075 226)"><rect width="205" height="74" rx="10" fill="#fff" stroke="#8cb5a5"/><text class="box-title" x="16" y="29">Environment Lease</text><text class="box-body" x="16" y="53">TTL / namespace / route</text></g>
  <g transform="translate(1305 226)"><rect width="220" height="74" rx="10" fill="#fff" stroke="#8cb5a5"/><text class="box-title" x="16" y="29">Evidence Invalidation</text><text class="box-body" x="16" y="53">制品变化 → 重跑依赖测试</text></g>

  <text class="zone" x="50" y="390">隔离的 Repo Workers</text>

  <g filter="url(#shadow)">
    <g transform="translate(50 420)"><rect width="350" height="190" rx="15" fill="#fff" stroke="#6591aa" stroke-width="2"/><rect width="350" height="47" rx="15" fill="#e5f0f5"/><rect y="32" width="350" height="15" fill="#e5f0f5"/><text class="box-title" x="22" y="30">Web / App</text><text class="box-body" x="22" y="78">branch + worktree</text><text class="box-body" x="22" y="105">UI test · bundle · SBOM</text><text class="mono" x="22" y="137">web@sha256:7a…</text><text class="box-body" x="22" y="166">契约：web-bff:v12</text></g>
    <g transform="translate(430 420)"><rect width="350" height="190" rx="15" fill="#fff" stroke="#8c79ad" stroke-width="2"/><rect width="350" height="47" rx="15" fill="#eee9f5"/><rect y="32" width="350" height="15" fill="#eee9f5"/><text class="box-title" x="22" y="30">BFF / API Gateway</text><text class="box-body" x="22" y="78">branch + worktree</text><text class="box-body" x="22" y="105">contract test · integration</text><text class="mono" x="22" y="137">bff@sha256:3f…</text><text class="box-body" x="22" y="166">聚合、降级与错误语义</text></g>
    <g transform="translate(810 420)"><rect width="350" height="190" rx="15" fill="#fff" stroke="#c18a49" stroke-width="2"/><rect width="350" height="47" rx="15" fill="#fbefdf"/><rect y="32" width="350" height="15" fill="#fbefdf"/><text class="box-title" x="22" y="30">Java 领域服务</text><text class="box-body" x="22" y="78">branch + worktree</text><text class="box-body" x="22" y="105">unit · migration dry run</text><text class="mono" x="22" y="137">order@sha256:91…</text><text class="box-body" x="22" y="166">expand / contract</text></g>
    <g transform="translate(1190 420)"><rect width="350" height="190" rx="15" fill="#fff" stroke="#4f947d" stroke-width="2"/><rect width="350" height="47" rx="15" fill="#e5f2ed"/><rect y="32" width="350" height="15" fill="#e5f2ed"/><text class="box-title" x="22" y="30">Python / Agent 服务</text><text class="box-body" x="22" y="78">branch + worktree</text><text class="box-body" x="22" y="105">eval · fixture · model version</text><text class="mono" x="22" y="137">agent@sha256:c4…</text><text class="box-body" x="22" y="166">prompt / skill / runtime digest</text></g>
  </g>

  <path d="M1185 338 C1185 375 225 375 225 418" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1185 338 C1185 375 605 375 605 418" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1185 338 C1185 375 985 375 985 418" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1185 338 C1185 375 1365 375 1365 418" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="50" y="662" width="960" height="156" rx="17" fill="#fff" stroke="#c4d2da" stroke-width="2"/>
  <text class="zone" x="80" y="701">Release Manifest：经过验证的唯一组合</text>
  <text class="mono" x="80" y="733">revision: 17　 base_release: 2026.07.2　 iteration_id: ITER-2026-0717-03</text>
  <text class="box-body" x="80" y="765">artifacts: web@7a… · bff@3f… · order@91… · agent@c4…</text>
  <text class="box-body" x="80" y="793">contracts: v12/v8/v5　 migrations: V20260717_01　 flags: new_flow=false</text>
  <path d="M225 610 L225 650 C225 660 530 650 530 660" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M605 610 L605 660" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M985 610 L985 650 C985 660 780 650 780 660" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M1365 610 C1365 640 940 630 940 660" fill="none" stroke="#456476" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="1060" y="662" width="480" height="238" rx="17" fill="#f4f1fa" stroke="#9d8fbd" stroke-width="2.5"/>
  <text class="zone" x="1090" y="701">环境漏斗与发布 Gate</text>
  <g transform="translate(1090 727)"><rect width="420" height="42" rx="8" fill="#fff" stroke="#b9acce"/><text class="box-body" x="18" y="27">Branch Preview　·　单系统可部署</text></g>
  <g transform="translate(1120 778)"><rect width="360" height="42" rx="8" fill="#fff" stroke="#b9acce"/><text class="box-body" x="18" y="27">任务级环境　·　跨系统主路径</text></g>
  <g transform="translate(1150 829)"><rect width="300" height="42" rx="8" fill="#fff8ed" stroke="#c88a44"/><text class="box-body" x="18" y="27">预发 → Canary → 生产验证</text></g>
  <line x1="1010" y1="740" x2="1058" y2="740" stroke="#b66a2c" stroke-width="3" marker-end="url(#arrow-gold)"/>

  <rect x="50" y="858" width="960" height="58" rx="10" fill="#eaf0f4"/>
  <text class="note" x="78" y="893">组合中的任一 digest 改变，manifest revision 必须变化；受影响的契约、E2E、性能和回滚证据随之失效并重跑。</text>
  <path d="M1210 900 C1050 953 450 953 310 918" fill="none" stroke="#b66a2c" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow-gold)"/>
  <text class="label" x="1040" y="947">失败：回滚或回到对应 Repo Worker</text>
</svg>
