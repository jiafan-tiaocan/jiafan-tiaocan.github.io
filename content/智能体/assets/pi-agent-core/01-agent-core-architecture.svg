<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Pi Agent Core 的四层架构</title>
  <desc id="desc">从 pi-ai 的模型协议，经 agentLoop 的纯循环、Agent 的状态事件封装，到 AgentHarness 的会话级运行时；coding-agent 和 RPC 位于应用适配层。</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fb}.box{fill:#fff;stroke:#c8d2df;stroke-width:2}.ai{fill:#eef6ff;stroke:#4583c2;stroke-width:2}.loop{fill:#f2edff;stroke:#7c5dc7;stroke-width:2}.agent{fill:#edf8f1;stroke:#3e9464;stroke-width:2}.harness{fill:#fff2e5;stroke:#d18031;stroke-width:2}.app{fill:#fff;stroke:#aab6c8;stroke-width:2;stroke-dasharray:8 6}.txt{fill:#182235;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif}.h1{font-size:30px;font-weight:700}.h2{font-size:20px;font-weight:700}.body{font-size:15px}.small{font-size:13px;fill:#536178}.tag{font-size:12px;font-weight:700;letter-spacing:.7px}.arrow{stroke:#59677c;stroke-width:2.5;fill:none;marker-end:url(#m)}.thin{stroke:#8a96a8;stroke-width:1.8;fill:none}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#59677c"/></marker>
  </defs>
  <rect class="bg" width="1280" height="820" rx="24"/>
  <text class="txt h1" x="54" y="58">Pi Agent Core 不是一个类：它是四层可拆的运行时</text>

  <rect class="app" x="70" y="92" width="1140" height="100" rx="18"/>
  <text class="txt tag" x="98" y="121">APPLICATION ADAPTERS · 不属于核心热路径</text>
  <text class="txt h2" x="98" y="155">coding-agent · RPC / JSON mode · CLI / TUI · 自定义应用</text>
  <text class="txt small" x="774" y="155">把输入、资源与展示接到 Harness；不重新实现循环</text>

  <rect class="harness" x="70" y="232" width="1140" height="128" rx="20"/>
  <text class="txt tag" x="98" y="263">LAYER 4 · APPLICATION RUNTIME</text>
  <text class="txt h2" x="98" y="301">AgentHarness</text>
  <text class="txt body" x="294" y="301">Session 树 · turn snapshot · resources · lifecycle hooks · compaction · branch · save point</text>
  <text class="txt small" x="98" y="333">把一次 prompt 变成可持久化、可导航、可插话的完整运行；资源仍由应用拥有</text>

  <rect class="agent" x="70" y="400" width="1140" height="118" rx="20"/>
  <text class="txt tag" x="98" y="431">LAYER 3 · STATEFUL WRAPPER</text>
  <text class="txt h2" x="98" y="469">Agent</text>
  <text class="txt body" x="294" y="469">AgentState · reducer · awaited subscribers · steering / follow-up queues · abort · one active run</text>
  <text class="txt small" x="98" y="498">薄封装：不发明第二套循环，只把 loop 的事件变成一致的可观察状态</text>

  <rect class="loop" x="70" y="558" width="1140" height="118" rx="20"/>
  <text class="txt tag" x="98" y="589">LAYER 2 · EXECUTION KERNEL</text>
  <text class="txt h2" x="98" y="627">agentLoop()</text>
  <text class="txt body" x="294" y="627">stream assistant → preflight tools → execute → tool results → steering / follow-up → next turn</text>
  <text class="txt small" x="98" y="656">两个 while 构成最小闭环；并行执行与 transcript 确定性在这一层完成</text>

  <rect class="ai" x="70" y="716" width="1140" height="72" rx="20"/>
  <text class="txt tag" x="98" y="744">LAYER 1 · MODEL PROTOCOL</text>
  <text class="txt h2" x="98" y="773">pi-ai</text>
  <text class="txt body" x="294" y="773">Model · Provider · Context · Message · Tool schema · streaming event · usage / stopReason</text>

  <path class="arrow" d="M640 716V684"/>
  <path class="arrow" d="M640 558V526"/>
  <path class="arrow" d="M640 400V368"/>
  <path class="arrow" d="M640 232V200"/>
</svg>
