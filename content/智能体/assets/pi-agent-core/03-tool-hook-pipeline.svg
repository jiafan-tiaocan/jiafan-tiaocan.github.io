<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Tool 与 Hook 的执行流水线</title>
  <desc id="desc">工具调用依次经过参数准备、Schema 校验、前置 Hook、执行、后置 Hook；并行执行时结束事件按完成顺序，而持久化消息按源码顺序。</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fb}.box{fill:#fff;stroke:#c8d1de;stroke-width:2}.hook{fill:#fff1e5;stroke:#d17c2b;stroke-width:2}.exec{fill:#edf5ff;stroke:#3f82c3;stroke-width:2}.persist{fill:#edf8f1;stroke:#3b9462;stroke-width:2}.txt{fill:#182235;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Arial,sans-serif}.h1{font-size:30px;font-weight:700}.h2{font-size:18px;font-weight:700}.body{font-size:15px}.small{font-size:13px;fill:#536178}.arrow{stroke:#59677c;stroke-width:2.3;fill:none;marker-end:url(#m)}.order{stroke:#3f82c3;stroke-width:3;fill:none}.persistLine{stroke:#3b9462;stroke-width:3;fill:none}
    </style>
    <marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0 10 5 0 10Z" fill="#59677c"/></marker>
  </defs>
  <rect class="bg" width="1280" height="760" rx="24"/>
  <text class="txt h1" x="52" y="58">Tool 是类型化事务；Hook 是生命周期插槽</text>
  <g>
    <rect class="box" x="48" y="120" width="176" height="92" rx="15"/><text class="txt h2" x="70" y="157">toolCall</text><text class="txt small" x="70" y="185">name + raw arguments</text>
    <rect class="box" x="264" y="120" width="176" height="92" rx="15"/><text class="txt h2" x="286" y="157">prepareArguments</text><text class="txt small" x="286" y="185">兼容旧参数形状</text>
    <rect class="box" x="480" y="120" width="176" height="92" rx="15"/><text class="txt h2" x="502" y="157">Schema validate</text><text class="txt small" x="502" y="185">TypeBox 校验</text>
    <rect class="hook" x="696" y="120" width="176" height="92" rx="15"/><text class="txt h2" x="718" y="157">beforeToolCall</text><text class="txt small" x="718" y="185">allow / block</text>
    <rect class="exec" x="912" y="120" width="176" height="92" rx="15"/><text class="txt h2" x="934" y="157">execute</text><text class="txt small" x="934" y="185">signal + onUpdate</text>
    <path class="arrow" d="M224 166H264"/><path class="arrow" d="M440 166H480"/><path class="arrow" d="M656 166H696"/><path class="arrow" d="M872 166H912"/>
  </g>
  <rect class="hook" x="912" y="274" width="176" height="92" rx="15"/><text class="txt h2" x="934" y="311">afterToolCall</text><text class="txt small" x="934" y="339">改 content/details/error</text>
  <rect class="box" x="696" y="274" width="176" height="92" rx="15"/><text class="txt h2" x="718" y="311">execution_end</text><text class="txt small" x="718" y="339">事件立即可见</text>
  <rect class="persist" x="480" y="274" width="176" height="92" rx="15"/><text class="txt h2" x="502" y="311">toolResult msg</text><text class="txt small" x="502" y="339">进入 transcript</text>
  <rect class="persist" x="264" y="274" width="176" height="92" rx="15"/><text class="txt h2" x="286" y="311">turn_end</text><text class="txt small" x="286" y="339">save point</text>
  <path class="arrow" d="M1000 212V274"/><path class="arrow" d="M912 320H872"/><path class="arrow" d="M696 320H656"/><path class="arrow" d="M480 320H440"/>

  <rect class="box" x="48" y="430" width="1184" height="244" rx="20"/>
  <text class="txt h2" x="78" y="468">并行批次为什么既快又可重放</text>
  <text class="txt small" x="78" y="502">预检仍按源码顺序串行：策略判断是确定的</text>
  <text class="txt body" x="78" y="548">Tool A（慢）</text><line class="order" x1="210" y1="542" x2="790" y2="542"/><circle cx="790" cy="542" r="8" fill="#3f82c3"/>
  <text class="txt body" x="78" y="594">Tool B（快）</text><line class="order" x1="210" y1="588" x2="530" y2="588"/><circle cx="530" cy="588" r="8" fill="#3f82c3"/>
  <text class="txt small" x="840" y="548">execution_end：B → A</text>
  <line class="persistLine" x1="210" y1="632" x2="790" y2="632"/>
  <circle cx="500" cy="632" r="8" fill="#3b9462"/><circle cx="710" cy="632" r="8" fill="#3b9462"/>
  <text class="txt small" x="840" y="637">message_end：A → B（源码顺序）</text>
  <text class="txt small" x="78" y="704">注意：Extension 可原地改 input，之后不会再次 Schema 校验；因此 Hook 不应成为唯一安全边界。</text>
</svg>
