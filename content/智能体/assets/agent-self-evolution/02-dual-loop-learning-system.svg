<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">问题驱动与价值驱动双环共享同一个 Learning Harness</title>
  <desc id="desc">上方左右两条证据链分别把生产失败与业务机会转成可证伪假设，随后共同进入候选生成、配对试验、独立评测和晋级门禁，版本化资产回到生产并产生下一轮证据。</desc>
  <defs>
    <marker id="arr-cyan" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#46D9E8"/></marker>
    <marker id="arr-amber" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#F6C85F"/></marker>
    <marker id="arr-violet" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#A78BFA"/></marker>
    <marker id="arr-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#5DD39E"/></marker>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0 H0 V32" fill="none" stroke="#31445F" stroke-width="1" opacity="0.16"/></pattern>
  </defs>

  <rect width="1440" height="900" rx="28" fill="#0B1220"/>
  <rect x="36" y="32" width="1368" height="816" rx="24" fill="url(#grid)" stroke="#1A2940"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <rect x="68" y="58" width="210" height="34" rx="17" fill="#111C2E" stroke="#31445F"/>
    <text x="173" y="80" text-anchor="middle" fill="#9FB0C6" font-size="15" font-weight="700" letter-spacing="1.2">FIGURE 06 · MECHANISM</text>
    <text x="68" y="130" fill="#E6EDF7" font-size="34" font-weight="720">两类经验，为什么要共享同一套学习内核</text>
    <text x="68" y="164" fill="#9FB0C6" font-size="18">信号来源与目标不同；候选、Trial、评测、门禁和资产协议必须一致。</text>

    <!-- Quality evidence chain -->
    <rect x="68" y="206" width="594" height="238" rx="22" fill="#102431" fill-opacity="0.9" stroke="#46D9E8" stroke-width="1.8"/>
    <rect x="92" y="228" width="184" height="34" rx="17" fill="#132C3A" stroke="#46D9E8"/>
    <text x="184" y="251" text-anchor="middle" fill="#46D9E8" font-size="16" font-weight="700">A · 问题驱动内环</text>
    <text x="92" y="292" fill="#E6EDF7" font-size="19" font-weight="700">守住当前能力的可信下限</text>
    <text x="92" y="319" fill="#9FB0C6" font-size="15">高频纠偏 · 目标相对确定</text>

    <circle cx="164" cy="373" r="31" fill="#111C2E" stroke="#46D9E8" stroke-width="2"/>
    <path d="M153 373 h22 M164 362 v22" stroke="#46D9E8" stroke-width="2.4" stroke-linecap="round"/>
    <text x="164" y="422" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">失败信号</text>
    <line x1="196" y1="373" x2="278" y2="373" stroke="#46D9E8" stroke-width="2.5" marker-end="url(#arr-cyan)"/>

    <circle cx="324" cy="373" r="31" fill="#111C2E" stroke="#46D9E8" stroke-width="2"/>
    <path d="M313 361 h22 v24 h-22 z M318 367 h12 M318 373 h12 M318 379 h8" fill="none" stroke="#46D9E8" stroke-width="1.8" stroke-linecap="round"/>
    <text x="324" y="422" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">Evidence</text>
    <line x1="356" y1="373" x2="438" y2="373" stroke="#46D9E8" stroke-width="2.5" marker-end="url(#arr-cyan)"/>

    <circle cx="484" cy="373" r="31" fill="#111C2E" stroke="#46D9E8" stroke-width="2"/>
    <path d="M470 384 l10-22 8 13 12-18" fill="none" stroke="#46D9E8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="484" y="422" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">修复假设</text>
    <rect x="532" y="342" width="104" height="62" rx="14" fill="#17313D" stroke="#46D9E8" stroke-opacity="0.7"/>
    <text x="584" y="367" text-anchor="middle" fill="#46D9E8" font-size="14" font-weight="700">OUTPUT</text>
    <text x="584" y="390" text-anchor="middle" fill="#E6EDF7" font-size="14">最小 Diff</text>

    <!-- Value evidence chain -->
    <rect x="778" y="206" width="594" height="238" rx="22" fill="#2B2415" fill-opacity="0.9" stroke="#F6C85F" stroke-width="1.8"/>
    <rect x="802" y="228" width="184" height="34" rx="17" fill="#342A16" stroke="#F6C85F"/>
    <text x="894" y="251" text-anchor="middle" fill="#F6C85F" font-size="16" font-weight="700">B · 价值驱动外环</text>
    <text x="802" y="292" fill="#E6EDF7" font-size="19" font-weight="700">探索未来能力的价值上限</text>
    <text x="802" y="319" fill="#9FB0C6" font-size="15">阶段探索 · 结果更不确定</text>

    <circle cx="874" cy="373" r="31" fill="#111C2E" stroke="#F6C85F" stroke-width="2"/>
    <path d="M862 379 c4-17 20-17 24 0 M867 361 h14" fill="none" stroke="#F6C85F" stroke-width="2.2" stroke-linecap="round"/>
    <text x="874" y="422" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">提案 / 效果</text>
    <line x1="906" y1="373" x2="988" y2="373" stroke="#F6C85F" stroke-width="2.5" marker-end="url(#arr-amber)"/>

    <circle cx="1034" cy="373" r="31" fill="#111C2E" stroke="#F6C85F" stroke-width="2"/>
    <path d="M1021 363 h26 M1021 373 h18 M1021 383 h22" fill="none" stroke="#F6C85F" stroke-width="2" stroke-linecap="round"/>
    <text x="1034" y="422" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">可比证据</text>
    <line x1="1066" y1="373" x2="1148" y2="373" stroke="#F6C85F" stroke-width="2.5" marker-end="url(#arr-amber)"/>

    <circle cx="1194" cy="373" r="31" fill="#111C2E" stroke="#F6C85F" stroke-width="2"/>
    <path d="M1180 384 l10-22 8 13 12-18" fill="none" stroke="#F6C85F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1194" y="422" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">能力假设</text>
    <rect x="1242" y="342" width="104" height="62" rx="14" fill="#372E19" stroke="#F6C85F" stroke-opacity="0.75"/>
    <text x="1294" y="367" text-anchor="middle" fill="#F6C85F" font-size="14" font-weight="700">OUTPUT</text>
    <text x="1294" y="390" text-anchor="middle" fill="#E6EDF7" font-size="14">迁移命题</text>

    <!-- inputs to shared kernel -->
    <path d="M584 404 C584 457 500 464 426 486" fill="none" stroke="#46D9E8" stroke-width="3" marker-end="url(#arr-cyan)"/>
    <path d="M1294 404 C1294 457 950 462 890 486" fill="none" stroke="#F6C85F" stroke-width="3" marker-end="url(#arr-amber)"/>

    <!-- Shared learning kernel -->
    <rect x="208" y="492" width="1024" height="206" rx="24" fill="#201A36" fill-opacity="0.94" stroke="#A78BFA" stroke-width="1.8"/>
    <rect x="236" y="514" width="226" height="34" rx="17" fill="#251E40" stroke="#A78BFA"/>
    <text x="349" y="537" text-anchor="middle" fill="#A78BFA" font-size="16" font-weight="700">SHARED LEARNING KERNEL</text>
    <text x="1198" y="537" text-anchor="end" fill="#9FB0C6" font-size="14">同一准入协议</text>

    <line x1="330" y1="613" x2="1110" y2="613" stroke="#31445F" stroke-width="2"/>
    <circle cx="350" cy="613" r="34" fill="#111C2E" stroke="#A78BFA" stroke-width="2"/>
    <text x="350" y="620" text-anchor="middle" fill="#A78BFA" font-size="20" font-weight="800">C</text>
    <text x="350" y="669" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">候选设计</text>
    <text x="350" y="690" text-anchor="middle" fill="#9FB0C6" font-size="13">冻结目标 · 最小变更</text>

    <line x1="384" y1="613" x2="546" y2="613" stroke="#A78BFA" stroke-width="3" marker-end="url(#arr-violet)"/>
    <circle cx="580" cy="613" r="34" fill="#111C2E" stroke="#A78BFA" stroke-width="2"/>
    <text x="580" y="620" text-anchor="middle" fill="#A78BFA" font-size="20" font-weight="800">T</text>
    <text x="580" y="669" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">配对 Trial</text>
    <text x="580" y="690" text-anchor="middle" fill="#9FB0C6" font-size="13">同 Case · 多次重复</text>

    <line x1="614" y1="613" x2="776" y2="613" stroke="#A78BFA" stroke-width="3" marker-end="url(#arr-violet)"/>
    <circle cx="810" cy="613" r="34" fill="#111C2E" stroke="#A78BFA" stroke-width="2"/>
    <text x="810" y="620" text-anchor="middle" fill="#A78BFA" font-size="20" font-weight="800">E</text>
    <text x="810" y="669" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">独立评测</text>
    <text x="810" y="690" text-anchor="middle" fill="#9FB0C6" font-size="13">Outcome · Trace · 风险</text>

    <line x1="844" y1="613" x2="1006" y2="613" stroke="#A78BFA" stroke-width="3" marker-end="url(#arr-violet)"/>
    <circle cx="1040" cy="613" r="34" fill="#17302D" stroke="#5DD39E" stroke-width="2"/>
    <text x="1040" y="620" text-anchor="middle" fill="#5DD39E" font-size="20" font-weight="800">G</text>
    <text x="1040" y="669" text-anchor="middle" fill="#5DD39E" font-size="16" font-weight="700">晋级门禁</text>
    <text x="1040" y="690" text-anchor="middle" fill="#9FB0C6" font-size="13">约束优先 · 可回滚</text>

    <!-- asset registry and production return -->
    <line x1="1040" y1="647" x2="1040" y2="735" stroke="#5DD39E" stroke-width="3.5" marker-end="url(#arr-green)"/>
    <rect x="386" y="740" width="668" height="70" rx="20" fill="#17302D" stroke="#5DD39E" stroke-width="1.7"/>
    <circle cx="430" cy="775" r="17" fill="#5DD39E" fill-opacity="0.15" stroke="#5DD39E"/>
    <path d="M420 775 l7 7 13-16" fill="none" stroke="#5DD39E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="466" y="769" fill="#E6EDF7" font-size="18" font-weight="700">Versioned Asset Registry</text>
    <text x="466" y="794" fill="#9FB0C6" font-size="15">Skill · Tool · Knowledge · Organization · Runtime</text>
    <rect x="886" y="757" width="142" height="36" rx="18" fill="#111C2E" stroke="#5DD39E"/>
    <text x="957" y="781" text-anchor="middle" fill="#5DD39E" font-size="15" font-weight="700">Canary -> Prod</text>

    <!-- feedback loops -->
    <path d="M386 775 C176 775 88 681 88 488 C88 468 94 454 112 443" fill="none" stroke="#46D9E8" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arr-cyan)"/>
    <path d="M1054 775 C1264 775 1352 681 1352 488 C1352 468 1346 454 1328 443" fill="none" stroke="#F6C85F" stroke-width="2.5" stroke-dasharray="8 7" marker-end="url(#arr-amber)"/>
    <text x="88" y="704" fill="#46D9E8" font-size="14" font-weight="700">生产偏差回流</text>
    <text x="1352" y="704" text-anchor="end" fill="#F6C85F" font-size="14" font-weight="700">价值证据回流</text>

    <rect x="334" y="848" width="772" height="30" rx="15" fill="#111C2E" stroke="#31445F"/>
    <text x="720" y="869" text-anchor="middle" fill="#E6EDF7" font-size="16" font-weight="700">双环共享的是“怎样证明改动有效”，而不是共享同一条业务流程。</text>
  </g>
</svg>
