<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Agent 系统的五层评测树与自动人工责任边界</title>
  <desc id="desc">左侧从可观测性可信度、工程稳定性、协作过程、任务产物到用户业务结果形成五层评测树。右侧区分确定性自动评测、模型辅助评测、人工评测和生产结果。底部强调前三层硬门禁通过后才比较多目标收益。</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#18263A" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#A78BFA"/>
    </marker>
  </defs>
  <rect width="1440" height="900" rx="28" fill="#0B1220"/>
  <rect x="36" y="32" width="1368" height="836" rx="24" fill="url(#grid)" stroke="#243650"/>

  <g font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <rect x="66" y="58" width="190" height="32" rx="16" fill="#122034" stroke="#31445F"/>
    <text x="161" y="80" text-anchor="middle" fill="#9FB0C6" font-size="15" letter-spacing="1.6">FIGURE 04 · EVALUATION</text>
    <text x="66" y="132" fill="#E6EDF7" font-size="34" font-weight="700">从“能跑”到“创造价值”：五层评测树</text>
    <text x="66" y="165" fill="#9FB0C6" font-size="18">低层决定一次运行是否有资格被比较，高层决定它是否值得被发布。</text>

    <!-- Left evaluation stack -->
    <rect x="66" y="205" width="808" height="550" rx="24" fill="#0F1A2B" stroke="#31445F"/>
    <text x="96" y="244" fill="#E6EDF7" font-size="20" font-weight="700">EVALUATION STACK</text>
    <text x="716" y="244" fill="#9FB0C6" font-size="14">先门禁，后优化 ↑</text>

    <g>
      <rect x="96" y="274" width="748" height="78" rx="16" fill="#102820" stroke="#5DD39E" stroke-width="2"/>
      <circle cx="132" cy="313" r="22" fill="#123B30" stroke="#5DD39E"/>
      <text x="132" y="319" text-anchor="middle" fill="#5DD39E" font-size="16" font-weight="700">L4</text>
      <text x="170" y="305" fill="#5DD39E" font-size="18" font-weight="700">用户与业务结果</text>
      <text x="170" y="331" fill="#D7E0EC" font-size="15">采用率 · 解决率 · 留存 · 决策影响 · 反指标</text>
      <rect x="708" y="295" width="112" height="34" rx="17" fill="#16352B" stroke="#5DD39E"/>
      <text x="764" y="317" text-anchor="middle" fill="#5DD39E" font-size="14">真实环境</text>

      <rect x="112" y="371" width="716" height="78" rx="16" fill="#2F2816" stroke="#F6C85F" stroke-width="2"/>
      <circle cx="148" cy="410" r="22" fill="#493B18" stroke="#F6C85F"/>
      <text x="148" y="416" text-anchor="middle" fill="#F6C85F" font-size="16" font-weight="700">L3</text>
      <text x="186" y="402" fill="#F6C85F" font-size="18" font-weight="700">任务产物质量</text>
      <text x="186" y="428" fill="#D7E0EC" font-size="15">分析 · 策略 · 排查专属 Rubric + 共同正确性</text>
      <rect x="692" y="392" width="112" height="34" rx="17" fill="#41351A" stroke="#F6C85F"/>
      <text x="748" y="414" text-anchor="middle" fill="#F6C85F" font-size="14">混合评测</text>

      <rect x="128" y="468" width="684" height="78" rx="16" fill="#211B37" stroke="#A78BFA" stroke-width="2"/>
      <circle cx="164" cy="507" r="22" fill="#30244E" stroke="#A78BFA"/>
      <text x="164" y="513" text-anchor="middle" fill="#C5B5FF" font-size="16" font-weight="700">L2</text>
      <text x="202" y="499" fill="#C5B5FF" font-size="18" font-weight="700">协作与过程合理性</text>
      <text x="202" y="525" fill="#D7E0EC" font-size="15">路由 · 并行 · Tool · 返工 Loop · Handoff · 上下文</text>
      <rect x="660" y="489" width="128" height="34" rx="17" fill="#30244E" stroke="#A78BFA"/>
      <text x="724" y="511" text-anchor="middle" fill="#C5B5FF" font-size="14">规则 + Judge</text>

      <rect x="144" y="565" width="652" height="78" rx="16" fill="#102A35" stroke="#46D9E8" stroke-width="2"/>
      <circle cx="180" cy="604" r="22" fill="#123844" stroke="#46D9E8"/>
      <text x="180" y="610" text-anchor="middle" fill="#46D9E8" font-size="16" font-weight="700">L1</text>
      <text x="218" y="596" fill="#46D9E8" font-size="18" font-weight="700">工程稳定性</text>
      <text x="218" y="622" fill="#D7E0EC" font-size="15">异常 · 超时 · 重试 · 幂等 · 持久化 · 恢复</text>
      <rect x="652" y="586" width="120" height="34" rx="17" fill="#133943" stroke="#46D9E8"/>
      <text x="712" y="608" text-anchor="middle" fill="#46D9E8" font-size="14">自动门禁</text>

      <rect x="160" y="662" width="620" height="66" rx="16" fill="#301D27" stroke="#FF6B6B" stroke-width="2"/>
      <circle cx="196" cy="695" r="22" fill="#47232E" stroke="#FF6B6B"/>
      <text x="196" y="701" text-anchor="middle" fill="#FF8A8A" font-size="16" font-weight="700">L0</text>
      <text x="234" y="688" fill="#FF8A8A" font-size="18" font-weight="700">可观测性可信度</text>
      <text x="234" y="714" fill="#D7E0EC" font-size="15">关键 Span · 版本 · Outcome · State Diff 完整</text>
      <rect x="640" y="678" width="116" height="34" rx="17" fill="#47232E" stroke="#FF6B6B"/>
      <text x="698" y="700" text-anchor="middle" fill="#FF8A8A" font-size="14">资格门禁</text>
    </g>

    <!-- Right responsibility matrix -->
    <rect x="904" y="205" width="470" height="550" rx="24" fill="#111C2E" stroke="#31445F"/>
    <text x="934" y="244" fill="#E6EDF7" font-size="20" font-weight="700">WHO SHOULD JUDGE?</text>
    <text x="934" y="270" fill="#9FB0C6" font-size="15">按可确定性分配评测者，而不是让人审全部 Trace。</text>

    <g>
      <rect x="934" y="297" width="410" height="92" rx="16" fill="#102A35" stroke="#46D9E8"/>
      <circle cx="970" cy="343" r="20" fill="#123844" stroke="#46D9E8"/>
      <path d="M960 343L968 351L981 335" fill="none" stroke="#46D9E8" stroke-width="3"/>
      <text x="1004" y="329" fill="#46D9E8" font-size="17" font-weight="700">确定性自动评测</text>
      <text x="1004" y="354" fill="#D7E0EC" font-size="15">Schema · 状态断言 · 超时 · 权限 · 成本</text>
      <text x="1004" y="376" fill="#9FB0C6" font-size="14">默认全量，负责硬门禁</text>

      <rect x="934" y="405" width="410" height="92" rx="16" fill="#211B37" stroke="#A78BFA"/>
      <circle cx="970" cy="451" r="20" fill="#30244E" stroke="#A78BFA"/>
      <text x="970" y="458" text-anchor="middle" fill="#C5B5FF" font-size="17" font-weight="700">J</text>
      <text x="1004" y="437" fill="#C5B5FF" font-size="17" font-weight="700">Model Judge 辅助</text>
      <text x="1004" y="462" fill="#D7E0EC" font-size="15">语义完整性 · 证据覆盖 · 过程合理性</text>
      <text x="1004" y="484" fill="#9FB0C6" font-size="14">必须校准，允许“不确定”</text>

      <rect x="934" y="513" width="410" height="92" rx="16" fill="#2F2816" stroke="#F6C85F"/>
      <circle cx="970" cy="559" r="20" fill="#493B18" stroke="#F6C85F"/>
      <text x="970" y="566" text-anchor="middle" fill="#F6C85F" font-size="17" font-weight="700">H</text>
      <text x="1004" y="545" fill="#F6C85F" font-size="17" font-weight="700">人工与专家标注</text>
      <text x="1004" y="570" fill="#D7E0EC" font-size="15">高风险 · 规范判断 · 分歧 · 新颖失败</text>
      <text x="1004" y="592" fill="#9FB0C6" font-size="14">主动采样，不做无差别全审</text>

      <rect x="934" y="621" width="410" height="92" rx="16" fill="#102820" stroke="#5DD39E"/>
      <circle cx="970" cy="667" r="20" fill="#123B30" stroke="#5DD39E"/>
      <text x="970" y="674" text-anchor="middle" fill="#5DD39E" font-size="17" font-weight="700">P</text>
      <text x="1004" y="653" fill="#5DD39E" font-size="17" font-weight="700">生产 Outcome</text>
      <text x="1004" y="678" fill="#D7E0EC" font-size="15">真实采用 · 长期效果 · 业务反指标</text>
      <text x="1004" y="700" fill="#9FB0C6" font-size="14">最终验证，不直接写入资产</text>
    </g>

    <path d="M880 695H896" stroke="#A78BFA" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- Bottom conclusion -->
    <rect x="132" y="790" width="1176" height="48" rx="24" fill="#122034" stroke="#F6C85F"/>
    <text x="720" y="820" text-anchor="middle" fill="#F6C85F" font-size="17" font-weight="700">G₀(可观测) ∧ G₁(稳定) ∧ Gsafety 通过后，再在质量、成本、人类负担与业务结果之间做 Pareto 选择</text>
  </g>
</svg>
