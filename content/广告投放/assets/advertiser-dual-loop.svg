<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">广告主与媒体的双重控制闭环</title>
  <desc id="desc">广告主围绕真实业务价值优化，媒体围绕库存收益与用户体验优化，双方通过曝光、计费和合规事件回传形成合作但不完全同目标的闭环。</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#4f67d8"/></marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#29966f"/></marker>
    <marker id="arrow-gold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#b67a24"/></marker>
    <style>
      .bg{fill:#fbfcff}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#17233a}.sub{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#5d687e}.h{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#17233a}.t{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#344057}.small{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#5d687e}.label{font:700 17px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif}.card{stroke-width:1.5}.line{fill:none;stroke-width:3}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720" rx="24"/>
  <text x="60" y="62" class="title">广告投放是两个目标函数之间的闭环协作</text>
  <text x="60" y="94" class="sub">双方共享一次竞价和一条转化链路，但看到的信息、承担的风险和最终目标不同</text>

  <rect x="60" y="140" width="400" height="400" rx="22" fill="#eef2ff" stroke="#aeb9ee" class="card"/>
  <text x="92" y="184" class="h">广告主决策面</text>
  <text x="92" y="222" class="t">目标：真实增量价值、长期质量、ROI</text>
  <rect x="92" y="254" width="336" height="64" rx="12" fill="#ffffff" stroke="#cbd3f4"/>
  <text x="112" y="282" class="label" fill="#4f67d8">观察</text><text x="172" y="282" class="t">端内行为、收入、留存、风险</text>
  <text x="112" y="306" class="small">更多后链路信息，但反馈更慢</text>
  <rect x="92" y="334" width="336" height="64" rx="12" fill="#ffffff" stroke="#cbd3f4"/>
  <text x="112" y="362" class="label" fill="#4f67d8">动作</text><text x="172" y="362" class="t">出价、人群、素材、预算、事件</text>
  <text x="112" y="386" class="small">追求可持续的单位经济性</text>
  <rect x="92" y="414" width="336" height="90" rx="12" fill="#ffffff" stroke="#cbd3f4"/>
  <text x="112" y="442" class="label" fill="#4f67d8">约束</text>
  <text x="112" y="471" class="t">合规、现金流、组织人力、归因延迟</text>
  <text x="112" y="494" class="small">“买到转化”不等于“买到价值”</text>

  <rect x="740" y="140" width="400" height="400" rx="22" fill="#edf9f4" stroke="#9ed8c2" class="card"/>
  <text x="772" y="184" class="h">媒体分配面</text>
  <text x="772" y="222" class="t">目标：库存收益、体验、生态与交付</text>
  <rect x="772" y="254" width="336" height="64" rx="12" fill="#ffffff" stroke="#bfe2d4"/>
  <text x="792" y="282" class="label" fill="#29966f">观察</text><text x="852" y="282" class="t">曝光、点击、回传事件、投诉</text>
  <text x="792" y="306" class="small">更多站内信息，但看不到全部价值</text>
  <rect x="772" y="334" width="336" height="64" rx="12" fill="#ffffff" stroke="#bfe2d4"/>
  <text x="792" y="362" class="label" fill="#29966f">动作</text><text x="852" y="362" class="t">预估、排序、探索、节奏控制</text>
  <text x="792" y="386" class="small">追求每次展示的综合收益</text>
  <rect x="772" y="414" width="336" height="90" rx="12" fill="#ffffff" stroke="#bfe2d4"/>
  <text x="792" y="442" class="label" fill="#29966f">约束</text>
  <text x="792" y="471" class="t">库存、用户体验、生态规则、稳定性</text>
  <text x="792" y="494" class="small">排序不是一条纯粹的 eCPM 公式</text>

  <rect x="490" y="250" width="220" height="164" rx="82" fill="#fff7e8" stroke="#e0b96f" stroke-width="2"/>
  <text x="600" y="298" text-anchor="middle" class="h">竞价交汇面</text>
  <text x="600" y="332" text-anchor="middle" class="t">候选 × 预估 × 出价</text>
  <text x="600" y="363" text-anchor="middle" class="t">规则 × 节奏 × 质量</text>
  <text x="600" y="393" text-anchor="middle" class="small">共同决定一次展示</text>

  <path d="M460 286 C500 240 700 240 740 286" class="line" stroke="#4f67d8" marker-end="url(#arrow-blue)"/>
  <text x="600" y="226" text-anchor="middle" class="label" fill="#4f67d8">合规、真实、可审计的事件回传</text>
  <path d="M740 382 C700 450 500 450 460 382" class="line" stroke="#29966f" marker-end="url(#arrow-green)"/>
  <text x="600" y="476" text-anchor="middle" class="label" fill="#29966f">曝光、点击、计费与流量结果</text>

  <rect x="60" y="584" width="1080" height="86" rx="16" fill="#fff7e8" stroke="#e6c98e"/>
  <circle cx="98" cy="627" r="16" fill="#b67a24"/>
  <text x="98" y="633" text-anchor="middle" font-size="19" font-weight="700" fill="#fff">!</text>
  <text x="130" y="619" class="label" fill="#8a5b1b">核心判断</text>
  <text x="130" y="649" class="t">利益相关不等于利益相同。广告主需要自己的测量、决策与记忆系统，不能把业务判断整体外包给媒体黑盒。</text>
</svg>
