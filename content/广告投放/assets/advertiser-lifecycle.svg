<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">广告账户的四阶段状态机</title>
  <desc id="desc">广告账户依次经历冷启动、扩量、稳态和衰退，不同阶段需要不同观察重点、动作和迁移门槛。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#6070bf"/></marker>
    <style>
      .bg{fill:#fbfcff}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#17233a}.sub{font:400 18px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#5d687e}.h{font:700 24px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#17233a}.t{font:400 17px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#344057}.s{font:500 15px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;fill:#667187}.cap{font:700 15px -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif;letter-spacing:1px}.card{stroke-width:1.5}
    </style>
  </defs>
  <rect class="bg" width="1200" height="680" rx="24"/>
  <text x="60" y="62" class="title">账户不是静态对象，而是一台会迁移的状态机</text>
  <text x="60" y="94" class="sub">每个阶段都要重新定义“好信号”和“好动作”；把一种策略打穿全生命周期，通常会把短期正反馈变成长期波动</text>

  <path d="M290 210H350" stroke="#6070bf" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M570 210H630" stroke="#6070bf" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M850 210H910" stroke="#6070bf" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(70,132)">
    <rect width="220" height="300" rx="20" fill="#eef2ff" stroke="#aeb9ee" class="card"/>
    <text x="24" y="38" class="cap" fill="#4f67d8">STATE 01</text><text x="24" y="76" class="h">冷启动</text>
    <text x="24" y="116" class="t">主要问题</text><text x="24" y="144" class="s">样本少、预估偏差大</text><text x="24" y="167" class="s">流量与成本均不稳定</text>
    <text x="24" y="207" class="t">优先动作</text><text x="24" y="235" class="s">提高信号密度与可辨识度</text><text x="24" y="258" class="s">小步验证素材与人群</text>
    <text x="24" y="288" class="t">迁移门槛：有效样本成形</text>
  </g>
  <g transform="translate(350,132)">
    <rect width="220" height="300" rx="20" fill="#edf9f4" stroke="#9ed8c2" class="card"/>
    <text x="24" y="38" class="cap" fill="#29966f">STATE 02</text><text x="24" y="76" class="h">扩量</text>
    <text x="24" y="116" class="t">主要问题</text><text x="24" y="144" class="s">增量流量是否同质</text><text x="24" y="167" class="s">边际成本是否恶化</text>
    <text x="24" y="207" class="t">优先动作</text><text x="24" y="235" class="s">分层出价、分批放量</text><text x="24" y="258" class="s">用质量护栏约束规模</text>
    <text x="24" y="288" class="t">迁移门槛：量价进入窄带</text>
  </g>
  <g transform="translate(630,132)">
    <rect width="220" height="300" rx="20" fill="#fff7e8" stroke="#e0b96f" class="card"/>
    <text x="24" y="38" class="cap" fill="#b67a24">STATE 03</text><text x="24" y="76" class="h">稳态</text>
    <text x="24" y="116" class="t">主要问题</text><text x="24" y="144" class="s">波动、欠交付与超成本</text><text x="24" y="167" class="s">人力盯盘难以持续</text>
    <text x="24" y="207" class="t">优先动作</text><text x="24" y="235" class="s">自动控制与异常分级</text><text x="24" y="258" class="s">保护高质量样本分布</text>
    <text x="24" y="288" class="t">迁移门槛：收益结构变化</text>
  </g>
  <g transform="translate(910,132)">
    <rect width="220" height="300" rx="20" fill="#f7effa" stroke="#ceb1da" class="card"/>
    <text x="24" y="38" class="cap" fill="#8c58a2">STATE 04</text><text x="24" y="76" class="h">衰退 / 重启</text>
    <text x="24" y="116" class="t">主要问题</text><text x="24" y="144" class="s">素材疲劳、库存变化</text><text x="24" y="167" class="s">历史学习形成路径依赖</text>
    <text x="24" y="207" class="t">优先动作</text><text x="24" y="235" class="s">诊断结构性原因</text><text x="24" y="258" class="s">换素材、换人群或止损</text>
    <text x="24" y="288" class="t">迁移门槛：重建有效信号</text>
  </g>

  <path d="M1020 454 C1020 555 180 555 180 454" fill="none" stroke="#8c58a2" stroke-width="3" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <text x="600" y="540" text-anchor="middle" class="t">重启不是复制旧基建，而是带着诊断结论重新获得信息</text>
  <rect x="70" y="584" width="1060" height="54" rx="14" fill="#eef1f8"/>
  <text x="600" y="618" text-anchor="middle" class="t">全阶段共同护栏：真实事件 · 合规授权 · 增量实验 · 预算上限 · 异常可回滚 · 决策可审计</text>
</svg>
