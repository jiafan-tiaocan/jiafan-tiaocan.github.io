<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="730" viewBox="0 0 1200 730" role="img" aria-labelledby="title desc">
  <title id="title">DiT-XL/2 的张量形状</title>
  <desc id="desc">展示 256 像素输入如何经 VAE 和 patchify 形成 256 个 1152 维 token，经过 28 个 block 后输出每 token 32 个数，再还原成 8 通道 latent 网格。</desc>
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#46D9E8"/></marker>
    <style>text{font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#E6EDF7}.title{font-size:30px;font-weight:750}.head{font-size:21px;font-weight:700}.body{font-size:18px}.small{font-size:16px;fill:#9FB0C6}.shape{font-size:19px;font-weight:650;fill:#46D9E8}.card{fill:#111C2E;stroke:#31445F;stroke-width:2}</style>
  </defs>
  <rect width="1200" height="730" rx="24" fill="#0B1220"/>
  <text class="title" x="56" y="58">拿 DiT-XL/2 跑一张 256×256 图：每个维度都能对上</text>
  <text class="body" x="56" y="90" fill="#9FB0C6">B 是 batch；C=4；latent 边长 I=32；patch p=2；hidden d=1152；head=16；depth=28。</text>

  <g>
    <rect class="card" x="50" y="138" width="160" height="132" rx="18"/>
    <text class="head" x="130" y="176" text-anchor="middle">RGB 图像</text><text class="shape" x="130" y="210" text-anchor="middle">B×3×256×256</text><text class="small" x="130" y="242" text-anchor="middle">像素空间</text>
    <line x1="210" y1="204" x2="247" y2="204" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
    <rect x="252" y="138" width="160" height="132" rx="18" fill="#201D3D" stroke="#A78BFA" stroke-width="2"/>
    <text class="head" x="332" y="176" text-anchor="middle">VAE + 加噪</text><text class="shape" x="332" y="210" text-anchor="middle">B×4×32×32</text><text class="small" x="332" y="242" text-anchor="middle">zₜ</text>
    <line x1="412" y1="204" x2="449" y2="204" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
    <rect class="card" x="454" y="124" width="192" height="160" rx="18"/>
    <text class="head" x="550" y="164" text-anchor="middle">Patchify /2</text><text class="shape" x="550" y="199" text-anchor="middle">B×256×1152</text><text class="small" x="550" y="229" text-anchor="middle">16×16 个 token</text><text class="small" x="550" y="256" text-anchor="middle">每 patch 2×2×4</text>
    <line x1="646" y1="204" x2="683" y2="204" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
    <rect x="688" y="124" width="200" height="160" rx="18" fill="#132B38" stroke="#46D9E8" stroke-width="2.5"/>
    <text class="head" x="788" y="164" text-anchor="middle">28 × DiT Block</text><text class="shape" x="788" y="199" text-anchor="middle">B×256×1152</text><text class="small" x="788" y="229" text-anchor="middle">形状始终不变</text><text class="small" x="788" y="256" text-anchor="middle">Attention + MLP</text>
    <line x1="888" y1="204" x2="925" y2="204" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
    <rect class="card" x="930" y="124" width="220" height="160" rx="18"/>
    <text class="head" x="1040" y="164" text-anchor="middle">Linear + Unpatchify</text><text class="shape" x="1040" y="199" text-anchor="middle">B×8×32×32</text><text class="small" x="1040" y="229" text-anchor="middle">4 通道噪声预测</text><text class="small" x="1040" y="256" text-anchor="middle">4 通道方差参数</text>
  </g>

  <text class="head" x="56" y="346" fill="#F6C85F">把中间一个 Self-Attention block 再放大</text>
  <rect class="card" x="56" y="376" width="1088" height="242" rx="20"/>
  <rect x="84" y="422" width="170" height="106" rx="15" fill="#132B38" stroke="#46D9E8"/>
  <text class="head" x="169" y="458" text-anchor="middle">输入 token</text><text class="shape" x="169" y="492" text-anchor="middle">B×256×1152</text>
  <line x1="254" y1="475" x2="293" y2="475" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
  <rect x="298" y="406" width="208" height="138" rx="15" fill="#111C2E" stroke="#A78BFA"/>
  <text class="head" x="402" y="444" text-anchor="middle">Q / K / V 分头</text><text class="shape" x="402" y="478" text-anchor="middle">B×16×256×72</text><text class="small" x="402" y="512" text-anchor="middle">72 = 1152 ÷ 16</text>
  <line x1="506" y1="475" x2="545" y2="475" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
  <rect x="550" y="406" width="220" height="138" rx="15" fill="#252337" stroke="#F6C85F"/>
  <text class="head" x="660" y="444" text-anchor="middle">QKᵀ 关系矩阵</text><text class="shape" x="660" y="478" text-anchor="middle">B×16×256×256</text><text class="small" x="660" y="512" text-anchor="middle">全局 token-to-token</text>
  <line x1="770" y1="475" x2="809" y2="475" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
  <rect x="814" y="406" width="208" height="138" rx="15" fill="#111C2E" stroke="#A78BFA"/>
  <text class="head" x="918" y="444" text-anchor="middle">加权 V + 合头</text><text class="shape" x="918" y="478" text-anchor="middle">B×256×1152</text><text class="small" x="918" y="512" text-anchor="middle">回到残差流</text>
  <line x1="1022" y1="475" x2="1061" y2="475" stroke="#46D9E8" stroke-width="3" marker-end="url(#a)"/>
  <rect x="1066" y="422" width="52" height="106" rx="14" fill="#132B38" stroke="#46D9E8"/>
  <text class="head" x="1092" y="482" text-anchor="middle">+</text>

  <rect x="56" y="646" width="1088" height="54" rx="14" fill="#101A2B" stroke="#31445F"/>
  <text class="body" x="600" y="680" text-anchor="middle">减半 patch：token 数 ×4；朴素 Attention 关系数约 ×16；参数量几乎不变。</text>
</svg>
