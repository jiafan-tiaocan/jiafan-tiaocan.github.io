<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="820" viewBox="0 0 1920 820">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08264f"/>
      <stop offset="1" stop-color="#0d7a96"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101c49"/>
      <stop offset="1" stop-color="#4d3e92"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#edf4ff"/>
      <stop offset="1" stop-color="#f6fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#18233a" flood-opacity=".14"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2f6df6"/>
    </marker>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0V28" fill="none" stroke="#c9d5e8" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="820" fill="#ffffff"/>
  
    <text x="70" y="70" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="38" font-weight="750" fill="#172033" text-anchor="start">双支路把两类监督信号分开，再在 Schema 层融合</text><text x="70" y="108" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="400" fill="#5f6b7a" text-anchor="start">开放内容描述允许多种正确答案；位置坐标可用几何奖励直接验证</text>
    <rect x="70" y="270" width="300" height="160" rx="24" fill="#f4f7fb" stroke="#d7deea" stroke-width="2"/>
    <text x="220" y="320" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="27" font-weight="750" fill="#102a54" text-anchor="middle">视觉卡片</text>
    <text x="220" y="360" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="500" fill="#5f6b7a" text-anchor="middle">像素输入</text>
    <text x="220" y="398" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="500" fill="#5f6b7a" text-anchor="middle">多尺寸 · 多版式</text>
    <line x1="370" y1="350" x2="515" y2="220" stroke="#2f6df6" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="370" y1="350" x2="515" y2="500" stroke="#2f6df6" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="515" y="135" width="500" height="210" rx="24" fill="#eef5ff" stroke="#aec8f6" stroke-width="2"/>
    <rect x="550" y="165" width="150" height="42" rx="21" fill="#2f6df6" stroke="#2f6df6" stroke-width="1"/><text x="625" y="194" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">位置支路</text>
    <text x="550" y="235" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="30" font-weight="750" fill="#172033" text-anchor="start">SFT → GRPO</text>
    <text x="550" y="280" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="500" fill="#5f6b7a" text-anchor="start">稳定角色集合、元素 ID 与精确 BBox</text>
    <rect x="515" y="405" width="500" height="210" rx="24" fill="#faf7ff" stroke="#c9bdf1" stroke-width="2"/>
    <rect x="550" y="435" width="150" height="42" rx="21" fill="#7857d8" stroke="#7857d8" stroke-width="1"/><text x="625" y="464" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">内容支路</text>
    <text x="550" y="505" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="30" font-weight="750" fill="#172033" text-anchor="start">通用 VLM</text>
    <text x="550" y="550" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="21" font-weight="500" fill="#5f6b7a" text-anchor="start">理解内容、色调、风格与版式关系</text>
    <line x1="1015" y1="240" x2="1170" y2="350" stroke="#2f6df6" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="1015" y1="510" x2="1170" y2="400" stroke="#2f6df6" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="1170" y="255" width="330" height="250" rx="24" fill="#effaf6" stroke="#9edfc5" stroke-width="2"/>
    <text x="1335" y="310" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="28" font-weight="750" fill="#19a974" text-anchor="middle">Schema 融合</text>
    <text x="1335" y="360" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="500" fill="#5f6b7a" text-anchor="middle">element_id 对齐</text>
    <text x="1335" y="398" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="500" fill="#5f6b7a" text-anchor="middle">冲突裁决与置信门禁</text>
    <text x="1335" y="436" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="20" font-weight="700" fill="#172033" text-anchor="middle">输出统一设计契约</text>
    <line x1="1500" y1="380" x2="1630" y2="380" stroke="#2f6df6" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="1630" y="295" width="220" height="170" rx="24" fill="#fff9ef" stroke="#f5d58a" stroke-width="2"/>
    <text x="1740" y="345" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="25" font-weight="750" fill="#ff7a45" text-anchor="middle">工具执行</text>
    <text x="1740" y="384" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="500" fill="#5f6b7a" text-anchor="middle">分割 · 擦除</text>
    <text x="1740" y="418" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="18" font-weight="500" fill="#5f6b7a" text-anchor="middle">图层写入</text>
    <text x="70" y="760" font-family="Arial, PingFang SC, Noto Sans CJK SC, sans-serif" font-size="23" font-weight="700" fill="#102a54" text-anchor="start">工程要点：双路不是重复推理，而是把“可以多样表达”与“必须精确命中”交给不同训练信号。</text>
  
</svg>