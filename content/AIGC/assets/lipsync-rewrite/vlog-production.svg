<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="730" viewBox="0 0 1400 730">
  <defs>
    <style>
      .bg{fill:#f8f8fb}.card{fill:#fff;stroke:#deddea;stroke-width:2}.accent{fill:#635bce}.teal{fill:#0f9d8b}.warm{fill:#f59e0b}.soft{fill:#f3f1ff}.ink{fill:#20212a}.muted{fill:#686979}.white{fill:#fff}.line{stroke:#9f9bbd;stroke-width:4}.title{font:700 34px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.h{font:700 22px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.p{font:500 17px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.s{font:500 15px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#9f9bbd"/></marker>
  </defs>
  <rect class="bg" width="1400" height="730" rx="28"/>
  <text x="70" y="70" class="title ink">一天 100 个全新形象真人 Vlog</text>
  <text x="70" y="108" class="p muted">把剧本、人物、动作、声音、表情和背景变成可组合资产</text>

  <rect x="80" y="165" width="250" height="115" rx="22" class="accent"/><text x="205" y="207" class="h white" text-anchor="middle">1. 剧本生成</text><text x="205" y="240" class="s white" text-anchor="middle">脚本库文本 + GPT</text><text x="205" y="266" class="s white" text-anchor="middle">输出场景化口播剧本</text>
  <line x1="335" y1="222" x2="400" y2="222" class="line" marker-end="url(#arrow)"/>
  <rect x="415" y="165" width="250" height="115" rx="22" class="teal"/><text x="540" y="207" class="h white" text-anchor="middle">2. 素材筛选</text><text x="540" y="240" class="s white" text-anchor="middle">人物 / 动作 / 声音</text><text x="540" y="266" class="s white" text-anchor="middle">表情 / 背景</text>
  <line x1="670" y1="222" x2="735" y2="222" class="line" marker-end="url(#arrow)"/>
  <rect x="750" y="165" width="250" height="115" rx="22" class="warm"/><text x="875" y="207" class="h white" text-anchor="middle">3. 音视频生成</text><text x="875" y="240" class="s white" text-anchor="middle">音色克隆生成 wav</text><text x="875" y="266" class="s white" text-anchor="middle">动作驱动生成 mp4</text>
  <line x1="1005" y1="222" x2="1070" y2="222" class="line" marker-end="url(#arrow)"/>
  <rect x="1085" y="165" width="235" height="115" rx="22" class="accent"/><text x="1202" y="207" class="h white" text-anchor="middle">4. 人物合成</text><text x="1202" y="240" class="s white" text-anchor="middle">表情编辑</text><text x="1202" y="266" class="s white" text-anchor="middle">口型改写</text>

  <line x1="1202" y1="285" x2="1202" y2="350" class="line" marker-end="url(#arrow)"/>
  <rect x="955" y="365" width="365" height="110" rx="22" class="teal"/><text x="1137" y="408" class="h white" text-anchor="middle">5. 场景替换与成片</text><text x="1137" y="443" class="s white" text-anchor="middle">合成最终真人 Vlog</text>

  <rect x="80" y="355" width="760" height="205" rx="24" class="card"/>
  <text x="120" y="405" class="h accent">资产库是规模化的基础</text>
  <g>
    <rect x="120" y="445" width="120" height="58" rx="16" class="soft"/><text x="180" y="482" class="p ink" text-anchor="middle">人物库</text>
    <rect x="260" y="445" width="120" height="58" rx="16" class="soft"/><text x="320" y="482" class="p ink" text-anchor="middle">动作库</text>
    <rect x="400" y="445" width="120" height="58" rx="16" class="soft"/><text x="460" y="482" class="p ink" text-anchor="middle">声音库</text>
    <rect x="540" y="445" width="120" height="58" rx="16" class="soft"/><text x="600" y="482" class="p ink" text-anchor="middle">表情库</text>
    <rect x="680" y="445" width="120" height="58" rx="16" class="soft"/><text x="740" y="482" class="p ink" text-anchor="middle">背景库</text>
  </g>
  <text x="120" y="540" class="s muted">筛选标签来自人设矩阵，例如性别、年龄、发型、服装、表情与场景。</text>

  <rect x="80" y="610" width="1240" height="64" rx="18" class="card"/>
  <text x="700" y="651" class="p ink" text-anchor="middle">原稿业务目标：结合人设矩阵，实现“一天生产 100 个全新形象真人 Vlog”的自动化生产。</text>
</svg>
