<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <style>
      .bg{fill:#f8f8fb}.card{fill:#fff;stroke:#deddea;stroke-width:2}.accent{fill:#635bce}.teal{fill:#0f9d8b}.warm{fill:#f59e0b}.soft{fill:#f3f1ff}.soft2{fill:#eaf8f5}.ink{fill:#20212a}.muted{fill:#686979}.white{fill:#fff}.line{stroke:#9f9bbd;stroke-width:4}.title{font:700 34px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.h{font:700 24px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.p{font:500 18px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}.s{font:500 15px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto"><path d="M0,0 L9,4 L0,8 Z" fill="#9f9bbd"/></marker>
  </defs>
  <rect class="bg" width="1400" height="760" rx="28"/>
  <text x="70" y="70" class="title ink">两阶段技术方案</text>
  <text x="70" y="108" class="p muted">先串联可落地模块，再训练端到端统一模型</text>

  <rect x="70" y="155" width="1260" height="225" rx="24" class="card"/>
  <rect x="70" y="155" width="190" height="225" rx="24" class="accent"/>
  <text x="165" y="230" class="h white" text-anchor="middle">阶段一</text><text x="165" y="266" class="p white" text-anchor="middle">快速业务落地</text><text x="165" y="316" class="s white" text-anchor="middle">模块串联</text>
  <g>
    <rect x="315" y="220" width="210" height="88" rx="18" class="soft"/><text x="420" y="255" class="h ink" text-anchor="middle">动作驱动</text><text x="420" y="285" class="s muted" text-anchor="middle">现有动作模型</text>
    <line x1="530" y1="264" x2="615" y2="264" class="line" marker-end="url(#arrow)"/>
    <rect x="630" y="220" width="240" height="88" rx="18" class="soft"/><text x="750" y="255" class="h ink" text-anchor="middle">表情迁移</text><text x="750" y="285" class="s muted" text-anchor="middle">LivePortrait</text>
    <line x1="875" y1="264" x2="960" y2="264" class="line" marker-end="url(#arrow)"/>
    <rect x="975" y="220" width="240" height="88" rx="18" class="soft"/><text x="1095" y="255" class="h ink" text-anchor="middle">口型改写</text><text x="1095" y="285" class="s muted" text-anchor="middle">MuseTalk</text>
  </g>
  <text x="315" y="345" class="s muted">目标：尽快打通真人 AI 数字人生成链路，并建立可复用的表情库和服务参数。</text>

  <rect x="70" y="425" width="1260" height="265" rx="24" class="card"/>
  <rect x="70" y="425" width="190" height="265" rx="24" class="teal"/>
  <text x="165" y="510" class="h white" text-anchor="middle">阶段二</text><text x="165" y="546" class="p white" text-anchor="middle">统一模型训练</text><text x="165" y="596" class="s white" text-anchor="middle">端到端控制</text>
  <rect x="315" y="490" width="235" height="100" rx="18" class="soft2"/><text x="432" y="528" class="h ink" text-anchor="middle">音频输入</text><text x="432" y="560" class="s muted" text-anchor="middle">节奏、音节、语义韵律</text>
  <line x1="555" y1="540" x2="650" y2="540" class="line" marker-end="url(#arrow)"/>
  <rect x="665" y="475" width="300" height="130" rx="18" class="soft2"/><text x="815" y="515" class="h ink" text-anchor="middle">扩散视频模型</text><text x="815" y="548" class="s muted" text-anchor="middle">Hallo + UniAnimate /</text><text x="815" y="573" class="s muted" text-anchor="middle">Animate Anyone / MimicMotion</text>
  <line x1="970" y1="540" x2="1065" y2="540" class="line" marker-end="url(#arrow)"/>
  <rect x="1080" y="475" width="200" height="130" rx="18" class="soft2"/><text x="1180" y="516" class="h ink" text-anchor="middle">统一输出</text><text x="1180" y="549" class="s muted" text-anchor="middle">全身动作</text><text x="1180" y="576" class="s muted" text-anchor="middle">面部表情与口型</text>
  <text x="315" y="650" class="s muted">目标：仅凭音频，精准控制全身动作、面部表情和时序连续性。</text>
</svg>
