<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="740" viewBox="0 0 1400 740" role="img" aria-labelledby="title desc">
  <title id="title">语言模型作为强化学习策略</title>
  <desc id="desc">展示提示与已生成 Token 构成状态、下一个 Token 是动作、完整回答获得终局奖励，以及单轮对话与多轮 Agent 的差异。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111F"/><stop offset="1" stop-color="#111B31"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#020617" flood-opacity="0.42"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#5EEAD4"/></marker>
    <marker id="credit" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#FBBF24"/></marker>
  </defs>
  <rect width="1400" height="740" fill="url(#bg)"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="70" y="66" fill="#F8FAFC" font-size="34" font-weight="700">把语言生成写成 MDP：Token 是动作，前缀是状态</text>
    <text x="70" y="103" fill="#94A3B8" font-size="17">难点不在定义，而在终局奖励如何跨越几百到几万 Token 分配信用</text>

    <g filter="url(#shadow)">
      <rect x="75" y="178" width="255" height="160" rx="20" fill="#111D31" stroke="#365073"/>
      <rect x="390" y="178" width="255" height="160" rx="20" fill="#111D31" stroke="#365073"/>
      <rect x="705" y="178" width="255" height="160" rx="20" fill="#111D31" stroke="#365073"/>
      <rect x="1020" y="178" width="305" height="160" rx="20" fill="#151D2B" stroke="#725D22"/>
    </g>

    <g text-anchor="middle">
      <text x="202" y="215" fill="#93C5FD" font-size="16" font-weight="700">STATE  s₀</text>
      <text x="517" y="215" fill="#93C5FD" font-size="16" font-weight="700">STATE  s₁</text>
      <text x="832" y="215" fill="#93C5FD" font-size="16" font-weight="700">STATE  sₜ</text>
      <text x="1172" y="215" fill="#FDE68A" font-size="16" font-weight="700">TERMINAL</text>

      <text x="202" y="259" fill="#F8FAFC" font-size="22" font-weight="700">提示 x</text>
      <text x="517" y="259" fill="#F8FAFC" font-size="22" font-weight="700">x + y₁</text>
      <text x="832" y="259" fill="#F8FAFC" font-size="22" font-weight="700">x + y&lt;t</text>
      <text x="1172" y="259" fill="#F8FAFC" font-size="22" font-weight="700">完整回答 y</text>

      <text x="202" y="300" fill="#94A3B8" font-size="14">用户问题 / 环境观察</text>
      <text x="517" y="300" fill="#94A3B8" font-size="14">确定性拼接转移</text>
      <text x="832" y="300" fill="#94A3B8" font-size="14">上下文持续增长</text>
      <text x="1172" y="300" fill="#FBBF24" font-size="15" font-weight="700">R(x, y) 或 R(τ)</text>
    </g>

    <g stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)">
      <line x1="330" y1="255" x2="382" y2="255"/><line x1="645" y1="255" x2="697" y2="255"/><line x1="960" y1="255" x2="1012" y2="255"/>
    </g>
    <g text-anchor="middle" font-size="13.5" font-weight="700">
      <rect x="336" y="211" width="40" height="31" rx="15" fill="#12332E"/><text x="356" y="232" fill="#99F6E4">y₁</text>
      <rect x="651" y="211" width="40" height="31" rx="15" fill="#12332E"/><text x="671" y="232" fill="#99F6E4">y₂</text>
      <rect x="966" y="211" width="40" height="31" rx="15" fill="#12332E"/><text x="986" y="232" fill="#99F6E4">EOS</text>
    </g>

    <path d="M1172 350 C1172 430 275 430 202 350" fill="none" stroke="#FBBF24" stroke-width="4" stroke-dasharray="9 8" marker-end="url(#credit)"/>
    <text x="687" y="413" text-anchor="middle" fill="#FDE68A" font-size="16" font-weight="700">policy gradient / critic / group baseline：把结果信用传回每个动作</text>

    <rect x="75" y="478" width="590" height="182" rx="21" fill="#0F1C2F" stroke="#2E4665"/>
    <rect x="735" y="478" width="590" height="182" rx="21" fill="#101F25" stroke="#2C5A50"/>
    <text x="108" y="520" fill="#93C5FD" font-size="20" font-weight="700">单轮回答：近似 contextual bandit</text>
    <text x="768" y="520" fill="#5EEAD4" font-size="20" font-weight="700">多轮 Agent：真正改变环境的 MDP</text>
    <g fill="#CBD5E1" font-size="15.5">
      <text x="108" y="557"><tspan x="108">• 状态主要是模型自己写出的前缀</tspan><tspan x="108" dy="27">• 通常只有完整回答得到一次奖励</tspan><tspan x="108" dy="27">• DPO / PPO-RLHF / GRPO 常从这里出发</tspan></text>
      <text x="768" y="557"><tspan x="768">• 工具、网页、代码执行返回新 observation</tspan><tspan x="768" dy="27">• 早期动作会改变几十步后的可达状态</tspan><tspan x="768" dy="27">• 需要轨迹回放、长程 credit 与权限约束</tspan></text>
    </g>
  </g>
</svg>
