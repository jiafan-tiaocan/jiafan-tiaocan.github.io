<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="790" viewBox="0 0 1400 790" role="img" aria-labelledby="title desc">
  <title id="title">PPO、DPO 与 GRPO 核心机制三联图</title>
  <desc id="desc">PPO 通过 ratio clipping 限制在线更新，DPO 通过偏好 margin 的 logistic loss 学习，GRPO 通过同题多样本的组内相对奖励构造优势。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#07111F"/><stop offset="1" stop-color="#111B31"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#020617" flood-opacity="0.42"/></filter>
    <marker id="up" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#2DD4BF"/></marker>
    <marker id="down" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z" fill="#FB7185"/></marker>
  </defs>
  <rect width="1400" height="790" fill="url(#bg)"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="70" y="65" fill="#F8FAFC" font-size="34" font-weight="700">三个算法，三个不同的“稳定器”</text>
    <text x="70" y="102" fill="#94A3B8" font-size="17">PPO 限制一次走多远；DPO 学 chosen 相对 reference 的 margin；GRPO 用同题样本互做 baseline</text>

    <g filter="url(#shadow)">
      <rect x="60" y="150" width="410" height="555" rx="24" fill="#101B2D" stroke="#304057"/>
      <rect x="495" y="150" width="410" height="555" rx="24" fill="#101B2D" stroke="#304057"/>
      <rect x="930" y="150" width="410" height="555" rx="24" fill="#101B2D" stroke="#304057"/>
    </g>
    <rect x="60" y="150" width="410" height="9" rx="5" fill="#60A5FA"/>
    <rect x="495" y="150" width="410" height="9" rx="5" fill="#A78BFA"/>
    <rect x="930" y="150" width="410" height="9" rx="5" fill="#2DD4BF"/>

    <text x="92" y="201" fill="#93C5FD" font-size="23" font-weight="700">PPO · 在线近端更新</text>
    <text x="527" y="201" fill="#C4B5FD" font-size="23" font-weight="700">DPO · 离线偏好 margin</text>
    <text x="962" y="201" fill="#5EEAD4" font-size="23" font-weight="700">GRPO · 组相对优势</text>

    <!-- PPO chart -->
    <g>
      <line x1="112" y1="500" x2="425" y2="500" stroke="#64748B" stroke-width="2"/>
      <line x1="150" y1="540" x2="150" y2="250" stroke="#64748B" stroke-width="2"/>
      <rect x="236" y="250" width="90" height="250" fill="#60A5FA" opacity="0.08"/>
      <line x1="236" y1="250" x2="236" y2="505" stroke="#60A5FA" stroke-dasharray="5 6"/>
      <line x1="326" y1="250" x2="326" y2="505" stroke="#60A5FA" stroke-dasharray="5 6"/>
      <path d="M120 470 L326 300 L420 300" fill="none" stroke="#60A5FA" stroke-width="5" stroke-linecap="round"/>
      <path d="M120 470 L420 220" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="7 6"/>
      <text x="281" y="550" fill="#CBD5E1" font-size="13" text-anchor="middle">importance ratio ρ</text>
      <text x="106" y="240" fill="#CBD5E1" font-size="13">surrogate</text>
      <text x="236" y="520" fill="#93C5FD" font-size="12" text-anchor="middle">1−ε</text>
      <text x="326" y="520" fill="#93C5FD" font-size="12" text-anchor="middle">1+ε</text>
      <text x="365" y="286" fill="#93C5FD" font-size="13">正优势被封顶</text>
      <text x="270" y="273" fill="#64748B" font-size="12" text-anchor="middle">trust region</text>
    </g>

    <!-- DPO chart -->
    <g>
      <line x1="542" y1="500" x2="860" y2="500" stroke="#64748B" stroke-width="2"/>
      <line x1="580" y1="540" x2="580" y2="250" stroke="#64748B" stroke-width="2"/>
      <line x1="700" y1="250" x2="700" y2="505" stroke="#A78BFA" stroke-dasharray="5 6"/>
      <path d="M590 275 C635 278 657 300 680 360 C705 423 760 466 850 480" fill="none" stroke="#A78BFA" stroke-width="5" stroke-linecap="round"/>
      <circle cx="634" cy="288" r="7" fill="#FB7185"/><circle cx="783" cy="470" r="7" fill="#2DD4BF"/>
      <text x="700" y="550" fill="#CBD5E1" font-size="13" text-anchor="middle">preference margin Δ</text>
      <text x="537" y="240" fill="#CBD5E1" font-size="13">loss</text>
      <text x="700" y="520" fill="#C4B5FD" font-size="12" text-anchor="middle">0</text>
      <text x="624" y="268" fill="#FDA4AF" font-size="13">chosen 仍落后</text>
      <text x="760" y="449" fill="#5EEAD4" font-size="13">chosen 领先</text>
      <text x="700" y="578" text-anchor="middle" fill="#94A3B8" font-size="12.5">Δ = β[(log πw−log πref,w) − (log πl−log πref,l)]</text>
    </g>

    <!-- GRPO chart -->
    <g>
      <line x1="982" y1="500" x2="1295" y2="500" stroke="#64748B" stroke-width="2"/>
      <line x1="1018" y1="540" x2="1018" y2="250" stroke="#64748B" stroke-width="2"/>
      <line x1="1020" y1="385" x2="1290" y2="385" stroke="#FBBF24" stroke-width="3" stroke-dasharray="8 6"/>
      <text x="1288" y="373" fill="#FDE68A" font-size="13" text-anchor="end">组均值 R̄</text>
      <g>
        <circle cx="1060" cy="455" r="11" fill="#FB7185"/><circle cx="1110" cy="425" r="11" fill="#FB7185"/>
        <circle cx="1160" cy="365" r="11" fill="#2DD4BF"/><circle cx="1210" cy="315" r="11" fill="#2DD4BF"/>
        <circle cx="1260" cy="278" r="11" fill="#2DD4BF"/>
      </g>
      <g stroke-width="3">
        <line x1="1060" y1="466" x2="1060" y2="494" stroke="#FB7185" marker-end="url(#down)"/>
        <line x1="1110" y1="436" x2="1110" y2="474" stroke="#FB7185" marker-end="url(#down)"/>
        <line x1="1160" y1="375" x2="1160" y2="337" stroke="#2DD4BF" marker-end="url(#up)"/>
        <line x1="1210" y1="305" x2="1210" y2="267" stroke="#2DD4BF" marker-end="url(#up)"/>
        <line x1="1260" y1="268" x2="1260" y2="230" stroke="#2DD4BF" marker-end="url(#up)"/>
      </g>
      <text x="1157" y="545" fill="#CBD5E1" font-size="13" text-anchor="middle">同一 prompt 的 G 条回答</text>
      <text x="977" y="240" fill="#CBD5E1" font-size="13">reward</text>
      <text x="1060" y="476" fill="#FDA4AF" font-size="12" text-anchor="middle">A&lt;0</text>
      <text x="1260" y="300" fill="#99F6E4" font-size="12" text-anchor="middle">A&gt;0</text>
      <text x="1157" y="578" text-anchor="middle" fill="#94A3B8" font-size="12.5">不训练 critic；全对或全错时组内信号消失</text>
    </g>

    <g>
      <rect x="92" y="610" width="346" height="60" rx="16" fill="#132641"/><text x="265" y="635" text-anchor="middle" fill="#DBEAFE" font-size="14" font-weight="700">需要 old policy + critic / advantage</text><text x="265" y="657" text-anchor="middle" fill="#93C5FD" font-size="13">适合逐状态信用与复杂在线回报</text>
      <rect x="527" y="610" width="346" height="60" rx="16" fill="#292146"/><text x="700" y="635" text-anchor="middle" fill="#EDE9FE" font-size="14" font-weight="700">需要固定偏好对 + reference</text><text x="700" y="657" text-anchor="middle" fill="#C4B5FD" font-size="13">不 rollout，不做经典在线交互</text>
      <rect x="962" y="610" width="346" height="60" rx="16" fill="#12332E"/><text x="1135" y="635" text-anchor="middle" fill="#ECFDF5" font-size="14" font-weight="700">需要同题多采样 + 标量奖励</text><text x="1135" y="657" text-anchor="middle" fill="#5EEAD4" font-size="13">最适合数学、代码等可验证任务</text>
    </g>
    <text x="700" y="754" text-anchor="middle" fill="#64748B" font-size="14">示意图只表达目标几何与数据依赖，不代表三个方法在同一任务上的性能排序。</text>
  </g>
</svg>
