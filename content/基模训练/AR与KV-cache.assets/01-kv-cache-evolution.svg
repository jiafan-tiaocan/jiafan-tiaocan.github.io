<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="820" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">KV-cache 从单序列增量复用到 Agent 跨会话基础设施的演进路线</title>
  <desc id="desc">六个阶段按瓶颈推动技术变化：增量解码、MQA GQA、分页内存、跨请求前缀复用、分层分布式缓存、Agent 会话状态协议。</desc>
  <style>
    :root {
      --bg: #f8fafc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #556277;
      --line: #cad2df;
      --blue: #2463eb;
      --blue-soft: #e9f0ff;
      --orange: #c65a16;
      --orange-soft: #fff0e5;
      --green: #18775a;
      --green-soft: #e7f6f0;
      --purple: #6d4bd2;
      --purple-soft: #f0ebff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --panel: #182235;
        --ink: #edf3ff;
        --muted: #b9c4d6;
        --line: #3a4961;
        --blue: #79a7ff;
        --blue-soft: #233b66;
        --orange: #ffab6f;
        --orange-soft: #55301f;
        --green: #63d3aa;
        --green-soft: #173f36;
        --purple: #b6a0ff;
        --purple-soft: #352c5b;
      }
    }
    text { font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif; fill: var(--ink); }
    .small { font-size: 18px; fill: var(--muted); }
    .body { font-size: 20px; fill: var(--muted); }
    .stage { font-size: 25px; font-weight: 700; }
    .year { font-size: 17px; font-weight: 700; fill: var(--blue); }
    .bottleneck { font-size: 17px; font-weight: 700; fill: var(--orange); }
    .convergence { font-size: 19px; font-weight: 700; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--orange)"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="820" rx="28" fill="var(--bg)"/>
  <text x="64" y="62" font-size="32" font-weight="800">KV-cache 的因果演进：每一次升级都在移动“状态由谁保存、在哪里复用”的边界</text>
  <text x="64" y="96" class="body">主线不是缓存越来越大，而是从一次解码的临时张量，变成可寻址、可调度、可隔离的推理状态。</text>

  <!-- Stage 1 -->
  <g filter="url(#shadow)">
    <rect x="60" y="145" width="430" height="210" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
    <rect x="82" y="168" width="120" height="32" rx="16" fill="var(--blue-soft)"/>
    <text x="142" y="190" text-anchor="middle" class="year">2017+</text>
    <text x="82" y="236" class="stage">1　单序列增量复用</text>
    <text x="82" y="272" class="body">缓存每层历史 K、V；新 token 只生成</text>
    <text x="82" y="301" class="body">自己的 q、k、v，再读取完整历史。</text>
    <text x="82" y="334" class="small">解决：重复计算历史投影与隐状态</text>
  </g>

  <!-- Stage 2 -->
  <g filter="url(#shadow)">
    <rect x="585" y="145" width="430" height="210" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
    <rect x="607" y="168" width="160" height="32" rx="16" fill="var(--blue-soft)"/>
    <text x="687" y="190" text-anchor="middle" class="year">2019-2023</text>
    <text x="607" y="236" class="stage">2　MQA / GQA</text>
    <text x="607" y="272" class="body">让多个 Query head 共享更少的 KV head，</text>
    <text x="607" y="301" class="body">直接缩小每 token 状态和读取带宽。</text>
    <text x="607" y="334" class="small">新限制：质量、并行切分与模型结构耦合</text>
  </g>

  <!-- Stage 3 -->
  <g filter="url(#shadow)">
    <rect x="1110" y="145" width="430" height="210" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
    <rect x="1132" y="168" width="120" height="32" rx="16" fill="var(--blue-soft)"/>
    <text x="1192" y="190" text-anchor="middle" class="year">2023</text>
    <text x="1132" y="236" class="stage">3　PagedAttention</text>
    <text x="1132" y="272" class="body">逻辑 token 块映射到非连续物理页，</text>
    <text x="1132" y="301" class="body">按需分配并支持共享与 Copy-on-Write。</text>
    <text x="1132" y="334" class="small">解决：预留浪费、碎片与动态批处理</text>
  </g>

  <path d="M 490 250 L 575 250" stroke="var(--orange)" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="487" y="205" width="95" height="28" rx="14" fill="var(--orange-soft)"/>
  <text x="535" y="225" text-anchor="middle" class="bottleneck">带宽/容量</text>

  <path d="M 1015 250 L 1100 250" stroke="var(--orange)" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="1014" y="205" width="89" height="28" rx="14" fill="var(--orange-soft)"/>
  <text x="1058" y="225" text-anchor="middle" class="bottleneck">碎片/并发</text>

  <!-- Stage 4 -->
  <g filter="url(#shadow)">
    <rect x="1110" y="435" width="430" height="210" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
    <rect x="1132" y="458" width="150" height="32" rx="16" fill="var(--green-soft)"/>
    <text x="1207" y="480" text-anchor="middle" class="year">2023-2024</text>
    <text x="1132" y="526" class="stage">4　跨请求前缀复用</text>
    <text x="1132" y="562" class="body">Radix tree 或链式 block hash 命中最长</text>
    <text x="1132" y="591" class="body">完全相同前缀，跳过对应 Prefill。</text>
    <text x="1132" y="624" class="small">新限制：节点局部、易驱逐、只能精确复用</text>
  </g>

  <!-- Stage 5 -->
  <g filter="url(#shadow)">
    <rect x="585" y="435" width="430" height="210" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
    <rect x="607" y="458" width="130" height="32" rx="16" fill="var(--green-soft)"/>
    <text x="672" y="480" text-anchor="middle" class="year">2024+</text>
    <text x="607" y="526" class="stage">5　分层与解耦</text>
    <text x="607" y="562" class="body">GPU → CPU → SSD/远端；Prefill 与</text>
    <text x="607" y="591" class="body">Decode 解耦，缓存位置进入调度决策。</text>
    <text x="607" y="624" class="small">新限制：传输、路由、一致性与安全成本</text>
  </g>

  <!-- Stage 6 -->
  <g filter="url(#shadow)">
    <rect x="60" y="435" width="430" height="210" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
    <rect x="82" y="458" width="140" height="32" rx="16" fill="var(--purple-soft)"/>
    <text x="152" y="480" text-anchor="middle" class="year">Agent 时代</text>
    <text x="82" y="526" class="stage">6　跨会话状态协议</text>
    <text x="82" y="562" class="body">稳定 Prompt 编译、租户盐、版本、TTL、</text>
    <text x="82" y="591" class="body">命中观测，与 Memory/Artifact 分层。</text>
    <text x="82" y="624" class="small">目标：便宜地“重算相同上下文”，而非记忆</text>
  </g>

  <path d="M 1325 355 L 1325 425" stroke="var(--orange)" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="1345" y="376" width="145" height="28" rx="14" fill="var(--orange-soft)"/>
  <text x="1418" y="396" text-anchor="middle" class="bottleneck">重复长 Prefill</text>

  <path d="M 1110 540 L 1025 540" stroke="var(--orange)" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="1018" y="495" width="100" height="28" rx="14" fill="var(--orange-soft)"/>
  <text x="1068" y="515" text-anchor="middle" class="bottleneck">容量/局部性</text>

  <path d="M 585 540 L 500 540" stroke="var(--orange)" stroke-width="3" marker-end="url(#arrow)"/>
  <rect x="488" y="495" width="110" height="28" rx="14" fill="var(--orange-soft)"/>
  <text x="543" y="515" text-anchor="middle" class="bottleneck">语义/治理</text>

  <rect x="60" y="703" width="1480" height="74" rx="22" fill="var(--panel)" stroke="var(--line)" stroke-width="2"/>
  <text x="88" y="733" class="convergence">收敛后的稳定模块</text>
  <text x="300" y="733" class="small">缓存身份</text>
  <text x="437" y="733" class="small">块分配器</text>
  <text x="574" y="733" class="small">前缀索引</text>
  <text x="711" y="733" class="small">缓存感知调度</text>
  <text x="886" y="733" class="small">分层传输</text>
  <text x="1023" y="733" class="small">隔离/失效</text>
  <text x="1160" y="733" class="small">SLO/成本观测</text>
  <text x="88" y="761" class="small">核心判断</text>
  <text x="300" y="761" class="body">KV-cache 已从 kernel 优化，演变为模型服务的状态平面；Agent 需要在其上再加语义与治理平面。</text>
</svg>
