<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252633}.h{font-size:31px;font-weight:700}.t{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#696b78}.a{stroke:#655bd1;stroke-width:5;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#655bd1"/></marker></defs>
  <rect width="1200" height="600" rx="28" fill="#faf9ff"/><text x="55" y="62" class="h">Grouping 时序预测：从序列相似度到 APTN 训练</text>
  <g transform="translate(55 120)"><rect width="305" height="325" rx="20" fill="#efedff" stroke="#c7c1ff"/><text x="152" y="45" text-anchor="middle" class="t">1　DTW 相似度</text><path d="M38 150C85 70 135 240 185 140S270 65 278 120" stroke="#655bd1" stroke-width="5" fill="none"/><path d="M38 210C85 130 135 300 185 200S270 125 278 180" stroke="#2aa879" stroke-width="5" fill="none"/><g stroke="#aaa" stroke-width="2"><path d="M92 136L92 196"/><path d="M108 127L108 187"/><path d="M124 135L124 195"/><path d="M140 153L140 213"/></g><text x="152" y="282" text-anchor="middle" class="s">以动态时间规整提取</text><text x="152" y="307" text-anchor="middle" class="s">形状与相位相似性</text></g>
  <path d="M370 282H430" class="a"/>
  <g transform="translate(440 120)"><rect width="305" height="325" rx="20" fill="#eaf8f2" stroke="#9bd8c1"/><text x="152" y="45" text-anchor="middle" class="t">2　序列自动分组</text><rect x="38" y="85" width="229" height="54" rx="12" fill="white"/><text x="152" y="118" text-anchor="middle" class="b">Cluster A：相似周期</text><rect x="38" y="155" width="229" height="54" rx="12" fill="white"/><text x="152" y="188" text-anchor="middle" class="b">Cluster B：相似趋势</text><rect x="38" y="225" width="229" height="54" rx="12" fill="white"/><text x="152" y="258" text-anchor="middle" class="b">Outlier：异常序列</text><text x="152" y="307" text-anchor="middle" class="s">共享模型，缓解小样本过拟合</text></g>
  <path d="M755 282H815" class="a"/>
  <g transform="translate(825 120)"><rect width="320" height="325" rx="20" fill="#fff1e9" stroke="#f0b18e"/><text x="160" y="45" text-anchor="middle" class="t">3　APTN 预测</text><rect x="42" y="92" width="236" height="70" rx="14" fill="white"/><text x="160" y="121" text-anchor="middle" class="b">历史目标 + 已知输入</text><text x="160" y="147" text-anchor="middle" class="s">环境、投放、周期、事件</text><path d="M160 172V220" class="a"/><rect x="72" y="230" width="176" height="55" rx="14" fill="#e9804f"/><text x="160" y="265" text-anchor="middle" fill="white" class="t">预测模型</text><text x="160" y="307" text-anchor="middle" class="s">点预测 + 置信区间</text></g>
  <rect x="170" y="500" width="860" height="50" rx="14" fill="#655bd1"/><text x="600" y="532" text-anchor="middle" fill="white" class="b">离线精度更高，同时在下游运筹模拟中的业务表现更好</text>
</svg>
