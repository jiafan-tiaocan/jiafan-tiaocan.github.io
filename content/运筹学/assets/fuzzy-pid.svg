<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <defs><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#252633}.h{font-size:31px;font-weight:700}.t{font-size:21px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#686a77}.a{stroke:#655bd1;stroke-width:5;fill:none;marker-end:url(#m)}</style><marker id="m" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#655bd1"/></marker></defs>
  <rect width="1200" height="620" rx="28" fill="#faf9ff"/><text x="55" y="62" class="h">模糊控制与 PID：按误差大小选择调控方式</text>
  <g transform="translate(65 180)"><rect width="170" height="80" rx="16" fill="#efedff"/><text x="85" y="35" text-anchor="middle" class="t">t+1</text><text x="85" y="62" text-anchor="middle" class="b">全投桶</text><path d="M180 40H260" class="a"/><rect x="270" width="260" height="80" rx="16" fill="#eaf8f2"/><text x="400" y="35" text-anchor="middle" class="t">冷启动分</text><text x="400" y="62" text-anchor="middle" class="b">与分配总量</text></g>
  <g transform="translate(65 340)"><rect width="170" height="80" rx="16" fill="#efedff"/><text x="85" y="35" text-anchor="middle" class="t">t+1h</text><text x="85" y="62" text-anchor="middle" class="b">实时数据</text><path d="M180 40H260" class="a"/><rect x="270" width="260" height="80" rx="16" fill="#eaf8f2"/><text x="400" y="49" text-anchor="middle" class="t">分配量纠偏</text></g>
  <path d="M605 260V320" class="a"/><path d="M595 220L520 220" stroke="#655bd1" stroke-width="5"/><path d="M595 380L520 380" stroke="#655bd1" stroke-width="5"/>
  <rect x="615" y="260" width="170" height="90" rx="18" fill="#655bd1"/><text x="700" y="298" text-anchor="middle" fill="white" class="t">t+15min</text><text x="700" y="327" text-anchor="middle" fill="white" class="b">PID 调控</text><path d="M795 305H855" class="a"/>
  <g transform="translate(865 145)"><rect width="280" height="125" rx="18" fill="#fff1e9" stroke="#f0b18e"/><text x="140" y="38" text-anchor="middle" class="t">大误差</text><text x="140" y="72" text-anchor="middle" class="b">曝光 - 召回分布</text><text x="140" y="101" text-anchor="middle" class="s">模糊映射到离散调幅</text></g>
  <g transform="translate(865 345)"><rect width="280" height="125" rx="18" fill="#eaf8f2" stroke="#9bd8c1"/><text x="140" y="38" text-anchor="middle" class="t">小误差</text><text x="140" y="72" text-anchor="middle" class="b">ERROR → SCORE</text><text x="140" y="101" text-anchor="middle" class="s">依赖 PID 精细微调</text></g>
  <path d="M785 290L855 205" class="a"/><path d="M785 320L855 405" class="a"/>
  <rect x="200" y="520" width="800" height="48" rx="14" fill="#655bd1"/><text x="600" y="551" text-anchor="middle" fill="white" class="b">大误差突破固定调幅限制，小误差保持 PID 的平稳性与精度</text>
</svg>
