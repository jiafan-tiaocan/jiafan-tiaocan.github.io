<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs><style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#242631}.h{font-size:32px;font-weight:700}.t{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#666978}.w{fill:#fff}.bw{font-size:17px;fill:#fff}.a{stroke:#655bd1;stroke-width:5;fill:none;marker-end:url(#arrow)}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#655bd1"/></marker></defs>
  <rect width="1200" height="650" rx="28" fill="#faf9ff"/>
  <text x="55" y="62" class="h">软约束：把“无解”改写为有代价的退让</text>
  <g transform="translate(60 130)">
    <rect width="300" height="330" rx="22" fill="#fff1e9" stroke="#f0b18e"/>
    <text x="150" y="50" text-anchor="middle" class="t">冲突输入</text>
    <rect x="32" y="85" width="236" height="58" rx="13" class="w"/><text x="150" y="121" text-anchor="middle" class="b">供给能力下降</text>
    <rect x="32" y="160" width="236" height="58" rx="13" class="w"/><text x="150" y="196" text-anchor="middle" class="b">多个下界同时抬高</text>
    <rect x="32" y="235" width="236" height="58" rx="13" class="w"/><text x="150" y="271" text-anchor="middle" class="b">预测或配置异常</text>
  </g>
  <path d="M370 295H430" class="a"/>
  <g transform="translate(440 130)">
    <rect width="320" height="330" rx="22" fill="#efedff" stroke="#c7c1ff"/>
    <text x="160" y="50" text-anchor="middle" class="t">松弛变量</text>
    <text x="160" y="105" text-anchor="middle" class="b">原约束</text>
    <text x="160" y="145" text-anchor="middle" class="t">L ≤ Ax ≤ U</text>
    <text x="160" y="200" text-anchor="middle" class="b">允许有价偏离</text>
    <text x="160" y="240" text-anchor="middle" class="t">L - s⁻ ≤ Ax ≤ U + s⁺</text>
    <text x="160" y="290" text-anchor="middle" class="s">s⁺, s⁻ ≥ 0，并记录偏离来源</text>
  </g>
  <path d="M770 295H830" class="a"/>
  <g transform="translate(840 130)">
    <rect width="300" height="330" rx="22" fill="#eaf8f2" stroke="#9bd8c1"/>
    <text x="150" y="50" text-anchor="middle" class="t">可控退让</text>
    <rect x="32" y="85" width="236" height="58" rx="13" class="w"/><text x="150" y="121" text-anchor="middle" class="b">按优先级支付惩罚</text>
    <rect x="32" y="160" width="236" height="58" rx="13" class="w"/><text x="150" y="196" text-anchor="middle" class="b">始终返回可执行方案</text>
    <rect x="32" y="235" width="236" height="58" rx="13" class="w"/><text x="150" y="271" text-anchor="middle" class="b">向人解释谁被牺牲</text>
  </g>
  <rect x="150" y="525" width="900" height="56" rx="15" fill="#655bd1"/><text x="600" y="560" text-anchor="middle" class="b" style="fill:#fff">安全红线保持硬约束；经营偏好、保量愿望和舒适区才适合软化</text>
</svg>
