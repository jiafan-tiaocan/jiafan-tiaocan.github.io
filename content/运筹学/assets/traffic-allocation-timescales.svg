<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <style>text{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;fill:#242631}.h{font-size:32px;font-weight:700}.t{font-size:22px;font-weight:700}.b{font-size:17px}.s{font-size:15px;fill:#666978}.w{fill:#fff}.bw{font-size:17px;fill:#fff}.a{stroke:#655bd1;stroke-width:5;fill:none;marker-end:url(#arrow)}</style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12z" fill="#655bd1"/></marker>
  </defs>
  <rect width="1200" height="650" rx="28" fill="#faf9ff"/>
  <text x="55" y="62" class="h">三个时钟：规划、滚动优化与反馈控制</text>
  <g transform="translate(70 125)">
    <rect width="300" height="345" rx="22" fill="#efedff" stroke="#c7c1ff"/>
    <circle cx="150" cy="88" r="50" fill="#655bd1"/><path d="M150 88V56M150 88L177 102" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="150" y="168" text-anchor="middle" class="t">慢时钟：基线规划</text>
    <text x="150" y="207" text-anchor="middle" class="b">看完整周期</text>
    <text x="150" y="242" text-anchor="middle" class="s">分配总量与目标轨迹</text>
    <text x="150" y="270" text-anchor="middle" class="s">建立可解释的全局基线</text>
    <text x="150" y="310" text-anchor="middle" class="s">低频、稳定、重约束</text>
  </g>
  <path d="M380 297H435" class="a"/>
  <g transform="translate(450 125)">
    <rect width="300" height="345" rx="22" fill="#eaf8f2" stroke="#9bd8c1"/>
    <circle cx="150" cy="88" r="50" fill="#2aa879"/><path d="M150 88V52M150 88L184 79" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="150" y="168" text-anchor="middle" class="t">中时钟：滚动优化</text>
    <text x="150" y="207" text-anchor="middle" class="b">看剩余窗口</text>
    <text x="150" y="242" text-anchor="middle" class="s">吸收最新预测与消耗</text>
    <text x="150" y="270" text-anchor="middle" class="s">重算余量和局部目标</text>
    <text x="150" y="310" text-anchor="middle" class="s">中频、适应、可调整</text>
  </g>
  <path d="M760 297H815" class="a"/>
  <g transform="translate(830 125)">
    <rect width="300" height="345" rx="22" fill="#fff1e9" stroke="#f0b18e"/>
    <circle cx="150" cy="88" r="50" fill="#e9804f"/><path d="M150 88V48M150 88L183 61" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <text x="150" y="168" text-anchor="middle" class="t">快时钟：反馈控制</text>
    <text x="150" y="207" text-anchor="middle" class="b">看当前误差</text>
    <text x="150" y="242" text-anchor="middle" class="s">小步调节执行变量</text>
    <text x="150" y="270" text-anchor="middle" class="s">抑制扰动、超调与震荡</text>
    <text x="150" y="310" text-anchor="middle" class="s">高频、限幅、可回退</text>
  </g>
  <rect x="180" y="535" width="840" height="52" rx="15" fill="#262835"/><text x="600" y="568" text-anchor="middle" class="b" style="fill:#fff">越靠近执行层，动作越快、范围越小、安全约束越硬</text>
</svg>
