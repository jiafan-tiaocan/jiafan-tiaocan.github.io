<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Transformer 组件变体的英德开发集 BLEU</title>
  <desc id="desc">以 base 模型 25.8 BLEU 为基准，展示单头、过多头、过小 key、过浅网络、无 dropout、无 label smoothing 和可学习位置编码的效果。</desc>
  <rect width="1200" height="720" fill="#0B1220"/>
  <g font-family="Inter, PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="60" y="58" fill="#E6EDF7" font-size="30" font-weight="700">组件变化真的让 BLEU 掉了多少？</text>
    <text x="60" y="91" fill="#9FB0C6" font-size="18">WMT14 English→German newstest2013 dev；数值来自论文 Table 3</text>

    <line x1="365" y1="130" x2="365" y2="625" stroke="#31445F" stroke-width="2"/>
    <line x1="365" y1="625" x2="1100" y2="625" stroke="#31445F" stroke-width="2"/>
    <g fill="#9FB0C6" font-size="15" text-anchor="middle">
      <text x="365" y="651">23.5</text><text x="512" y="651">24.0</text><text x="659" y="651">24.5</text>
      <text x="806" y="651">25.0</text><text x="953" y="651">25.5</text><text x="1100" y="651">26.0 BLEU</text>
    </g>
    <g stroke="#24354D" stroke-width="1">
      <line x1="512" y1="130" x2="512" y2="625"/><line x1="659" y1="130" x2="659" y2="625"/>
      <line x1="806" y1="130" x2="806" y2="625"/><line x1="953" y1="130" x2="953" y2="625"/>
      <line x1="1100" y1="130" x2="1100" y2="625"/>
    </g>

    <g fill="#E6EDF7" font-size="17" text-anchor="end">
      <text x="340" y="166">base：8 heads, d_k=64</text>
      <text x="340" y="226">1 head</text>
      <text x="340" y="286">32 heads, d_k=16</text>
      <text x="340" y="346">d_k=16</text>
      <text x="340" y="406">2 layers</text>
      <text x="340" y="466">no dropout</text>
      <text x="340" y="526">no label smoothing</text>
      <text x="340" y="586">learned position</text>
    </g>

    <rect x="365" y="142" width="676" height="34" rx="8" fill="#5DD39E"/>
    <rect x="365" y="202" width="412" height="34" rx="8" fill="#FF6B6B"/>
    <rect x="365" y="262" width="559" height="34" rx="8" fill="#F6C85F"/>
    <rect x="365" y="322" width="471" height="34" rx="8" fill="#FF6B6B"/>
    <rect x="365" y="382" width="59" height="34" rx="8" fill="#FF6B6B"/>
    <rect x="365" y="442" width="324" height="34" rx="8" fill="#FF6B6B"/>
    <rect x="365" y="502" width="530" height="34" rx="8" fill="#F6C85F"/>
    <rect x="365" y="562" width="647" height="34" rx="8" fill="#46D9E8"/>

    <g fill="#E6EDF7" font-size="17" font-weight="700">
      <text x="1055" y="166">25.8</text>
      <text x="791" y="226">24.9  (−0.9)</text>
      <text x="938" y="286">25.4  (−0.4)</text>
      <text x="850" y="346">25.1  (−0.7)</text>
      <text x="438" y="406">23.7  (−2.1)</text>
      <text x="703" y="466">24.6  (−1.2)</text>
      <text x="909" y="526">25.3  (−0.5)</text>
      <text x="1026" y="586">25.7  (−0.1)</text>
    </g>

    <rect x="60" y="674" width="1080" height="32" rx="10" fill="#182942"/>
    <text x="600" y="696" fill="#E6EDF7" font-size="17" text-anchor="middle">
      最强退化来自过浅网络；多头和足够的 key 维度有证据，但 Attention 并非唯一贡献
    </text>
  </g>
</svg>
